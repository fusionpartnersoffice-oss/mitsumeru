// Haversine公式：2地点間の距離(km)を算出
function clientHaversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// C-1：住所文字列から市町村を抽出（郡＋町村はまとめて1単位として扱う。政令市の区までは分解しない簡易実装）
function extractCity(addr) {
  const m = addr && addr.match(/^(?:岐阜県|愛知県|三重県)(.+?(?:市|区|町|村))/);
  return m ? m[1] : '';
}

function populateCityFilter() {
  const pv = document.getElementById('prefFilter').value;
  const sel = document.getElementById('cityFilter');
  const cities = new Set();
  data.forEach(f => {
    if (pv !== 'ALL' && f.properties.pref !== pv) return;
    const c = extractCity(f.properties.addr);
    if (c) cities.add(c);
  });
  const sorted = Array.from(cities).sort((a,b) => a.localeCompare(b, 'ja'));
  const current = sel.value;
  sel.innerHTML = '<option value="ALL">すべて</option>' + sorted.map(c => `<option value="${c}">${c}</option>`).join('');
  sel.value = sorted.includes(current) ? current : 'ALL';
}

function getVisible() {
  const pv = document.getElementById('prefFilter').value;
  const cv = document.getElementById('cityFilter').value;
  const rv = document.getElementById('rankFilter').value;
  const sv = document.getElementById('statusFilter').value;
  return data.filter(f => {
    const p = f.properties;
    const pm = pv==='ALL'||p.pref===pv;
    const cm = cv==='ALL'||extractCity(p.addr)===cv;
    const rm = rv==='ALL'||(rv==='AB'&&(p.rank==='A'||p.rank==='B'))||p.rank===rv;
    const tm = typeFilterState[p.type] !== false;
    const sm = sv==='ALL'||p.status===sv;
    return pm && cm && rm && tm && sm;
  }).sort((a,b) => b.properties.capacity - a.properties.capacity);
}

function updateStatus(id, status) {
  data[id].properties.status = status;
  saveStatus(id, status);
  render();
  // ポップアップを開き直す
  if (markerMap[id]) {
    markerMap[id].setPopupContent(makePopupHTML(data[id].properties, id));
  }

function render() {
  _rebuildingMarkers = true;
  layerGroup.clearLayers();
  _rebuildingMarkers = false;
  markerMap = {};
  const visible = getVisible();
  document.getElementById('total-count').textContent = visible.length;
  document.getElementById('a-count').textContent = visible.filter(f=>f.properties.rank==='A').length;
  document.getElementById('b-count').textContent = visible.filter(f=>f.properties.rank==='B').length;
  document.getElementById('c-count').textContent = visible.filter(f=>f.properties.rank==='C').length;
  visible.forEach(f => {
    const p = f.properties;
    const id = f.id;
    const marker = L.marker(f.geometry.coordinates.slice().reverse(), {icon: makeIcon(p, id===activeId)})
      .bindPopup(makePopupHTML(p, id), {maxWidth:290,className:''})
      .on('click', () => {
        // マーカー全体をclearLayers()で再構築すると、開いたばかりのpopupが
        // 同期的に破棄されてしまうため、ここではrender()を呼ばずアイコンの
        // 見た目更新・サイドバーのハイライト・popup再表示のみを行う
        const prevId = activeId;
        activeId = id;
        if (prevId !== null && prevId !== id && markerMap[prevId] && data[prevId]) {
          markerMap[prevId].setIcon(makeIcon(data[prevId].properties, false));
        }
        marker.setIcon(makeIcon(p, true));
        marker.openPopup();
        renderSidebar(visible);
      })
      .on('popupclose', () => { if(!_rebuildingMarkers && activeId===id){activeId=null; renderSidebar(visible);} });
    marker.addTo(layerGroup);
    markerMap[id] = marker;
  });
  renderSidebar(visible);
}

function renderSidebar(visible) {
  const list = document.getElementById('facility-list');
  document.getElementById('sidebar-count').textContent = visible.length + '件';
  list.innerHTML = '';
  visible.forEach(f => {
    const p = f.properties;
    const id = f.id;
    const sc = STATUS_COLORS[p.status] || '#546e7a';
    const card = document.createElement('div');
    card.className = 'fac-card' + (id===activeId?' active':'');
    card.innerHTML = `
      <div><span class="fac-rank" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.rank}</span>
           <span class="fac-status-badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${p.status}</span></div>
      <div class="fac-name">${p.name}</div>
      <div class="fac-meta">${p.corp} ／ ${p.type}</div>
      <div class="fac-score">定員 ${p.capacity}名 ／ <span style="font-size:11px;font-weight:normal;color:#8b949e">${p.phone}</span></div>
    `;
    card.onclick = () => {
      activeId = id;
      render();
      if(markerMap[id]) { markerMap[id].openPopup(); map.panTo(f.geometry.coordinates.slice().reverse()); }
    };
    list.appendChild(card);
  });
}

  a.download = '弦システム_紹介元リスト_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.csv';
  a.click();
}
document.getElementById('ref-csv-btn').onclick = exportReferralCSV;

// --- 座標取得 ---
function clientFindFacilityByName(name) {
  if (!name || !name.trim()) return null;
  const f = data.find(x => x.properties.name.includes(name.trim()));
  if (!f) return null;
  return { lat: f.properties.lat, lng: f.properties.lon, name: f.properties.name };
}

async function clientGeocodeAddress(addr) {
  const url = 'https://nominatim.openstreetmap.org/search?format=json&countrycodes=jp&limit=1&q=' + encodeURIComponent(addr);
  try {
    const res = await fetch(url);
    const json = await res.json();
    if (json && json[0]) return { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
  } catch (e) {}
  return null;
}

function clientSearchFacility() {
  const name = document.getElementById('client-form-name').value;
  const status = document.getElementById('client-geocode-status');
  const hit = clientFindFacilityByName(name);
  if (hit) {
    document.getElementById('client-form-lat').value = hit.lat;
    document.getElementById('client-form-lng').value = hit.lng;
    status.textContent = `✓ 既存データ「${hit.name}」の座標を反映しました`;
  } else {
    status.textContent = '既存データに該当施設が見つかりませんでした。住所検索または手動入力をご利用ください。';
  }
}

async function clientGeocodeFromAddress() {
  const addr = document.getElementById('client-form-addr').value;
  const status = document.getElementById('client-geocode-status');
  if (!addr.trim()) { status.textContent = '住所を入力してください。'; return; }
  status.textContent = '検索中…';
  const result = await clientGeocodeAddress(addr);
  if (result) {
    document.getElementById('client-form-lat').value = result.lat;
    document.getElementById('client-form-lng').value = result.lng;
    status.textContent = '⚠️ 参考値を取得しました。地図で位置がずれていないか必ずご確認ください。';
  } else {
    status.textContent = '取得できませんでした。緯度経度を手動で入力してください。';
  }
}

// --- 登録フォーム ---
function showClientForm() {
  document.getElementById('client-form-name').value = '';
  document.getElementById('client-form-addr').value = '';
  document.getElementById('client-form-contract-date').value = '';
  document.getElementById('client-form-lat').value = '';
  document.getElementById('client-form-lng').value = '';
  document.getElementById('client-geocode-status').textContent = '';
  document.getElementById('client-form').style.display = '';
  document.getElementById('client-detail').style.display = 'none';
}
function hideClientForm() {
  document.getElementById('client-form').style.display = 'none';
}

function submitClientForm() {
  const name = document.getElementById('client-form-name').value.trim();
  const lat = parseFloat(document.getElementById('client-form-lat').value);
  const lng = parseFloat(document.getElementById('client-form-lng').value);
  if (!name) { alert('施設名を入力してください。'); return; }
  if (isNaN(lat) || isNaN(lng)) { alert('緯度・経度が未確定です。「既存データから検索」「住所から検索」を試すか、緯度経度を手動で入力してください。'); return; }
  const client = addClient({
    name,
    type: document.getElementById('client-form-type').value,
    addr: document.getElementById('client-form-addr').value.trim(),
    contractStartDate: document.getElementById('client-form-contract-date').value,
    lat, lng,
    radiusKm: CLIENT_DEFAULT_RADIUS_KM,
  });
  hideClientForm();
  renderClientSelectOptions();
  document.getElementById('client-select').value = client.clientId;
  onClientSelectChange();
}

// --- クライアント選択・詳細表示 ---
function renderClientSelectOptions() {
  const sel = document.getElementById('client-select');
  const clients = loadClients();
  const current = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>' +
    clients.map(c => `<option value="${c.clientId}">${esc(c.name)}</option>`).join('');
  if (clients.some(c => c.clientId === current)) sel.value = current;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onClientSelectChange() {
  const id = document.getElementById('client-select').value;
  activeClientId = id || null;
  hideClientForm();
  if (!activeClientId) {
    document.getElementById('client-detail').style.display = 'none';
    clientLayerGroup.clearLayers();
    if (clientRadiusCircle) { map.removeLayer(clientRadiusCircle); clientRadiusCircle = null; }
    return;
  }
  const client = getClientById(activeClientId);
  document.getElementById('client-detail').style.display = '';
  document.getElementById('client-radius-slider').value = client.radiusKm;
  document.getElementById('client-radius-value').textContent = client.radiusKm;
  renderClientPanel();
  renderClientMap(client);
}

function onClientRadiusChange(value) {
  const radiusKm = parseInt(value, 10);
  document.getElementById('client-radius-value').textContent = radiusKm;
  if (!activeClientId) return;
  updateClientRadius(activeClientId, radiusKm);
  const client = getClientById(activeClientId);
  renderClientPanel();
  renderClientMap(client);
}

// --- 抽出ロジック ---
function getClientNearbyReferrals(client) {
  return REFERRAL_DATA
    .filter(r => {
      const cat = REFERRAL_CATEGORIES[r.category];
      if (!cat || !cat.available) return false;
      return clientHaversineKm(client.lat, client.lng, r.lat, r.lon) <= client.radiusKm;
    })
    .map(r => ({ ...r, distanceKm: clientHaversineKm(client.lat, client.lng, r.lat, r.lon) }))
    .sort((a, b) => a.distanceKm - b.distanceKm);
}

function getClientNearbyCompetitors(client) {
  return data.filter(f => {
    const p = f.properties;
    if (p.type !== client.type) return false;
    if (p.name === client.name) return false; // クライアント自身が見込み客データにも存在する場合は除外
    return clientHaversineKm(client.lat, client.lng, p.lat, p.lon) <= client.radiusKm;
  });
}

function clientCompetitorDensityLevel(count) {
  if (count <= 2) return { level: '競合薄い', priority: '高', cls: 'client-density-high' };
  if (count <= 5) return { level: '競合中程度', priority: '中', cls: 'client-density-mid' };
  return { level: '競合過密', priority: '低', cls: 'client-density-low' };
}

function clientBuildPriorityAdvice(client) {
  const referrals = getClientNearbyReferrals(client);
  const competitors = getClientNearbyCompetitors(client);
  const density = clientCompetitorDensityLevel(competitors.length);
  const byCategory = {};
  referrals.forEach(r => {
    const st = getClientRefStatus(client.clientId, r.id);
    if (!byCategory[r.category]) byCategory[r.category] = { total: 0, untouched: 0 };
    byCategory[r.category].total++;
    if (st === '未接触') byCategory[r.category].untouched++;
  });
  return Object.entries(byCategory).map(([category, stat]) => ({
    category, untouched: stat.untouched, total: stat.total,
    text: `${client.name}の周辺${client.radiusKm}km圏内に、未接触の${category}が${stat.untouched}件あります。競合密度は${density.level}のため、優先度は${density.priority}です。`,
  }));
}

function clientReferralPriorityLabel(status, densityPriority) {
  if (status !== '未接触') return '低（対応中/完了）';
  return densityPriority;
}

// --- 描画 ---
function renderClientPanel() {
  const client = getClientById(activeClientId);
  if (!client) return;
  const referrals = getClientNearbyReferrals(client);
  const competitors = getClientNearbyCompetitors(client);
  const density = clientCompetitorDensityLevel(competitors.length);
  const advice = clientBuildPriorityAdvice(client);

  const summary = document.getElementById('client-summary');
  summary.innerHTML = `
    <div style="font-size:13px;font-weight:bold;color:#e6edf3;">${esc(client.name)}</div>
    <div style="font-size:11px;color:#8b949e;margin:4px 0 8px;">${esc(client.type)} ／ ${esc(client.addr || '住所未登録')}${client.contractStartDate ? ' ／ 契約開始：' + esc(client.contractStartDate) : ''}</div>
    <div style="font-size:12px;color:#c9d1d9;">競合（同種別）：${competitors.length}件　<span class="client-density-badge ${density.cls}">${density.level}・優先度${density.priority}</span></div>
    <div style="font-size:12px;color:#c9d1d9;margin-top:4px;">抽出紹介元：${referrals.length}件</div>
    <div style="margin-top:8px;">
      ${advice.length ? advice.map(a => `<div class="client-advice-card">${esc(a.text)}</div>`).join('') : '<div class="client-advice-card">半径圏内に対象カテゴリの紹介元データがありません。</div>'}
    </div>
  `;

  const list = document.getElementById('client-referral-list');
  if (!referrals.length) {
    list.innerHTML = '<div style="font-size:12px;color:#8b949e;">半径圏内に紹介元データがありません。</div>';
    return;
  }
  list.innerHTML = `<div style="font-size:11px;color:#8b949e;margin-bottom:6px;">抽出された紹介元（距離が近い順）</div>` +
    referrals.map(r => {
      const cat = REFERRAL_CATEGORIES[r.category];
      const st = getClientRefStatus(client.clientId, r.id);
      const pr = clientReferralPriorityLabel(st, density.priority);
      const statusOpts = STATUS_LIST.map(s => `<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('');
      return `<div class="client-ref-row">
        <div class="client-ref-row-hdr">
          <span>${cat && cat.priority ? '★ ' : ''}${esc(r.name)}</span>
          <span style="font-size:10px;color:#8b949e">${r.distanceKm.toFixed(1)}km</span>
        </div>
        <div class="client-ref-row-meta">${esc(r.category)} ／ 優先度：${esc(pr)}</div>
        <select onchange="onClientRefStatusChange('${client.clientId}','${r.id}',this.value)">${statusOpts}</select>
      </div>`;
    }).join('');
}

function onClientRefStatusChange(clientId, referralId, status) {
  saveClientRefStatus(clientId, referralId, status);
  renderClientPanel();
}

function renderClientMap(client) {
  clientLayerGroup.clearLayers();
  if (clientRadiusCircle) { map.removeLayer(clientRadiusCircle); clientRadiusCircle = null; }
  if (!client) return;
  L.marker([client.lat, client.lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="width:22px;height:22px;border-radius:6px;background:#f0c674;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:12px;">🏢</div>`,
      iconSize: [22, 22], iconAnchor: [11, 11],
    }),
  }).bindPopup(`<b>${esc(client.name)}</b><br>クライアント中心点（半径${client.radiusKm}km）`).addTo(clientLayerGroup);
  clientRadiusCircle = L.circle([client.lat, client.lng], {
    radius: client.radiusKm * 1000, color: '#f0c674', weight: 2, fillOpacity: 0.06,
  }).addTo(map);
  map.panTo([client.lat, client.lng]);
}

// --- モード切替 ---
function toggleClientMode() {
  clientModeOn = !clientModeOn;
  document.getElementById('client-mode-btn').classList.toggle('active', clientModeOn);
  document.getElementById('client-panel').style.display = clientModeOn ? '' : 'none';
  document.getElementById('facility-list').style.display = clientModeOn ? 'none' : '';
  document.getElementById('csv-btn').style.display = clientModeOn ? 'none' : '';
  document.getElementById('ref-csv-btn').style.display = clientModeOn ? 'none' : '';
  if (clientModeOn) {
    map.addLayer(clientLayerGroup);
    renderClientSelectOptions();
    if (activeClientId) {
      const client = getClientById(activeClientId);
      if (client) { renderClientPanel(); renderClientMap(client); }
    }
  } else {
    map.removeLayer(clientLayerGroup);
    if (clientRadiusCircle) { map.removeLayer(clientRadiusCircle); clientRadiusCircle = null; }
  }
}

// --- CSV出力 ---
function exportClientReferralCSV(client) {
  const referrals = getClientNearbyReferrals(client);
  const competitors = getClientNearbyCompetitors(client);
  const density = clientCompetitorDensityLevel(competitors.length);
  const cols = ['名称','カテゴリ','距離(km)','アプローチ状況','優先度'];
  const rows = referrals.map(r => {
    const st = getClientRefStatus(client.clientId, r.id);
    const pr = clientReferralPriorityLabel(st, density.priority);
    return [r.name, r.category, r.distanceKm.toFixed(1), st, pr]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '﻿' + cols.join(',') + '\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = `弦システム_クライアント抽出リスト_${client.name}_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.csv`;
  a.click();
}
function exportClientReferralCSVClick() {
  const client = getClientById(activeClientId);
  if (!client) { alert('クライアントを選択してください。'); return; }
  exportClientReferralCSV(client);
}
