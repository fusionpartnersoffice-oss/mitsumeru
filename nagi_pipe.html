<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凪 軸B：営業 | Fusion Partners</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ffb74d'/><text x='16' y='24' font-size='18' text-anchor='middle'>📈</text></svg>">
<style>
:root {
  --bg:#0f1923; --surface:#1a2634; --card:#223044;
  --accent:#4fc3f7; --accent2:#81c784; --accent3:#ffb74d; --accent4:#f06292;
  --danger:#ef5350; --warn:#ffa726; --text:#e8eaf0; --sub:#8fa3b8;
  --border:#2e4460; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;min-height:100vh;font-size:14px;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#ffb74d,#e65100);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
header h1{font-size:1rem;font-weight:700;color:var(--accent3);flex:1;}
header h1 span{font-size:0.68rem;font-weight:400;color:var(--sub);}

.selector-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.selector-bar select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:0.8rem;outline:none;}
.selector-bar select:focus{border-color:var(--accent);}
.selector-bar label{font-size:0.78rem;color:var(--sub);}

main{max-width:1000px;margin:0 auto;padding:20px 16px 80px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:760px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.card-title{font-size:0.75rem;color:var(--sub);margin-bottom:6px;}
.card-value{font-size:1.5rem;font-weight:700;}
.card-sub{font-size:0.72rem;color:var(--sub);margin-top:3px;}
.empty{text-align:center;color:var(--sub);padding:40px 20px;font-size:0.82rem;}

.section{margin-bottom:22px;}
.section-title{font-size:0.85rem;color:var(--accent3);margin-bottom:12px;border-left:3px solid var(--accent3);padding-left:8px;}

.btn{padding:8px 18px;border-radius:7px;border:none;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--accent3);color:#000;}
.btn-primary:hover{background:#ffa726;}
.btn-secondary{background:var(--card);color:var(--sub);border:1px solid var(--border);}
.btn-secondary:hover{color:var(--text);}
.btn-sm{padding:5px 12px;font-size:0.74rem;}

.form-group{margin-bottom:12px;}
.form-group label{font-size:0.78rem;color:var(--sub);display:block;margin-bottom:3px;}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-size:0.85rem;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent3);}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
@media(max-width:600px){.form-row3{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="logo">📈</div>
  <h1>凪 軸B：営業 <span>NDBパイプライン | Fusion Partners</span></h1>
  <a href="./nagi_system.html" class="btn btn-secondary btn-sm" style="text-decoration:none;">🧭 ハブ（羅針盤）へ戻る</a>
</header>

<div class="selector-bar">
  <label>法人</label>
  <select id="sel-corp" onchange="onCorpChange()"><option value="">── 選択 ──</option></select>
  <label>事業所</label>
  <select id="sel-office" onchange="onOfficeChange()"><option value="">── 選択 ──</option></select>
  <span style="font-size:0.7rem;color:var(--sub);margin-left:auto;">法人・事業所の新規登録は<a href="./nagi_system.html" style="color:var(--accent3);">ハブ</a>の⚙データ管理から行ってください</span>
</div>

<main>

<div class="section" id="empty-state">
  <div class="card empty">事業所を選択してください（未登録の場合は<a href="./nagi_system.html" style="color:var(--accent3);">ハブ</a>の⚙データ管理→事業所で登録）</div>
</div>

<div id="pipe-body" style="display:none;">

  <div class="section">
    <div class="section-title">📥 パイプライン入力（<span id="office-label">-</span>）</div>
    <div class="card">
      <p style="font-size:0.78rem;color:var(--sub);margin-bottom:10px;">NDB動線（アプローチ→問い合わせ→見学→成約→リピート）の実数を入力してください。</p>
      <div class="form-row3">
        <div class="form-group"><label>アプローチ数</label><input id="pipe-approach" type="number" placeholder="100"></div>
        <div class="form-group"><label>問い合わせ数</label><input id="pipe-inquiry" type="number" placeholder="10"></div>
        <div class="form-group"><label>見学数</label><input id="pipe-visit" type="number" placeholder="5"></div>
      </div>
      <div class="form-row3">
        <div class="form-group"><label>成約数</label><input id="pipe-contract" type="number" placeholder="2"></div>
        <div class="form-group"><label>リピート数</label><input id="pipe-repeat" type="number" placeholder="2"></div>
      </div>
      <button class="btn btn-primary" onclick="savePipe()">💾 保存</button>
      <span id="save-msg" style="margin-left:10px;font-size:0.78rem;color:var(--accent2);"></span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🧭 現在の状態（<span id="office-label2">-</span>）</div>
    <div class="card" id="pipe-signal-card"></div>
  </div>

  <div class="section" id="pipe-ai-section" style="display:none;">
    <div class="card" id="pipe-ai-comment"></div>
  </div>

</div>

<div class="section">
  <div class="section-title">📊 全事業所 パイプライン一覧</div>
  <div id="pipe-summary"></div>
</div>
<div class="grid-2">
  <div class="section">
    <div class="section-title">🏆 成約率ランキング</div>
    <div id="pipe-ranking"></div>
  </div>
  <div class="section">
    <div class="section-title">📋 案件ステータス（全事業所計）</div>
    <div id="pipe-status"></div>
  </div>
</div>

</main>

<script>
// ════════════════════════════════════════════════════
//  共通ヘルパー（nagi_system.html と同一実装・localStorageスキーマ互換）
// ════════════════════════════════════════════════════
function load(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch{ return []; } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
function n(v){ return Number(v)||0; }
function getCorps(){ return load('nagi_corps'); }
function getAllOffices(){ return load('nagi_offices'); }
function getPipe(oid){ return (load('nagi_pipe').find(p=>p.officeId===oid))||null; }

// ════════════════════════════════════════════════════
//  シグナル判定（羅針盤タブと同一しきい値：0件=赤／1〜2件=黄／3件以上=緑）
// ════════════════════════════════════════════════════
function renderSignalCard(p){
  if(!p) return '<div class="card-title">シグナル判定</div><div class="empty" style="padding:12px;">パイプラインデータ未入力</div>';
  const approach = n(p.approach);
  const sig = approach===0 ? ['#ef5350','🔴 商談中案件がゼロです'] : approach<=2 ? ['#ffa726','🟡 商談件数が少なめ'] : ['#81c784','🟢 商談件数は良好'];
  const rate = n(p.visit) ? n(p.contract)/n(p.visit) : null;
  const repeatRate = n(p.contract) ? n(p.repeat)/n(p.contract) : null;
  return `
    <div class="card-title">シグナル判定</div>
    <div style="margin:8px 0;"><span class="tag" style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:600;background:${sig[0]}22;color:${sig[0]};border:1px solid ${sig[0]}44;">${sig[1]}</span></div>
    <div class="grid-3" style="margin-top:10px;">
      <div><div style="font-size:0.68rem;color:var(--sub);">アプローチ</div><div style="font-weight:700;font-size:0.9rem;">${approach}件</div></div>
      <div><div style="font-size:0.68rem;color:var(--sub);">見学</div><div style="font-weight:700;font-size:0.9rem;">${n(p.visit)}件</div></div>
      <div><div style="font-size:0.68rem;color:var(--sub);">成約</div><div style="font-weight:700;font-size:0.9rem;color:var(--accent2);">${n(p.contract)}件</div></div>
    </div>
    <div style="margin-top:10px;font-size:0.78rem;color:var(--sub);">
      成約率（見学→成約）：${rate!==null?(rate*100).toFixed(1)+'%':'─'}　／　リピート率（成約→リピート）：${repeatRate!==null?(repeatRate*100).toFixed(1)+'%':'─'}
    </div>
  `;
}

// ════════════════════════════════════════════════════
//  入力フォーム CRUD（nagi_system.html の loadPipeForm/savePipe と同一スキーマ）
// ════════════════════════════════════════════════════
function loadPipeForm(){
  const oid=document.getElementById('sel-office').value;
  const p=getPipe(oid);
  ['approach','inquiry','visit','contract','repeat'].forEach(k=>{ document.getElementById('pipe-'+k).value = p ? (p[k]||'') : ''; });
  document.getElementById('pipe-signal-card').innerHTML = renderSignalCard(p);
  loadPipeAIComment(p);
}

function savePipe(){
  const oid=document.getElementById('sel-office').value;
  if(!oid){ alert('事業所を選択してください'); return; }
  const data=load('nagi_pipe').filter(p=>p.officeId!==oid);
  data.push({
    officeId:oid,
    approach:n(document.getElementById('pipe-approach').value),
    inquiry:n(document.getElementById('pipe-inquiry').value),
    visit:n(document.getElementById('pipe-visit').value),
    contract:n(document.getElementById('pipe-contract').value),
    repeat:n(document.getElementById('pipe-repeat').value),
    updatedAt:new Date().toISOString(),
  });
  save('nagi_pipe',data);
  const msg=document.getElementById('save-msg');
  msg.textContent='✅ 保存しました（ハブの🧭羅針盤・📈営業タブに即時反映されます）';
  setTimeout(()=>{ msg.textContent=''; },4000);
  loadPipeForm();
  renderAllOfficesPipe();
}

// ════════════════════════════════════════════════════
//  B-AI：AI補足コメント（ルールベースとは別枠・表示のみ・自動アクション化しない）
//  設計書：06_イノベーション/凪次の手AI化_軸B詳細設計_20260706.md §2-3
//  APIキーはハブ（nagi_system.html）と同一localStorageキーを共有（同一origin）
// ════════════════════════════════════════════════════
function nagiPipeGetApiKey(){
  return localStorage.getItem('mitsumeru_api_key') || '';
}

function callClaudeForPipeAI(prompt, onSuccess, onError){
  const key = nagiPipeGetApiKey();
  if(!key){ onError('APIキー未設定'); return; }
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 300,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(r => r.json())
  .then(data => {
    if(data.error){ onError(data.error.message || 'APIエラー'); return; }
    const text = data.content?.[0]?.text || '';
    onSuccess(text);
  })
  .catch(e => onError(e.message || 'ネットワークエラー'));
}

function buildPipeAIPrompt(p){
  return `以下は、ある事業所の営業パイプライン状況です。
- アプローチ：${n(p.approach)}件
- 問い合わせ：${n(p.inquiry)}件
- 訪問：${n(p.visit)}件
- 成約：${n(p.contract)}件
- リピート：${n(p.repeat)}件
- 最終更新：${p.updatedAt ? new Date(p.updatedAt).toLocaleDateString('ja-JP') : '未記録'}

この数字の並びから読み取れる「段階間の停滞」や「タイミングの助言」を1〜2文で述べてください。
件数の絶対的な多い・少ないの指摘は不要です（別の仕組みで対応済みのため）。
断定的な経営判断（「担当を変えるべき」等）は避け、観察に基づく助言に留めてください。`;
}

function loadPipeAIComment(p){
  const section = document.getElementById('pipe-ai-section');
  const box = document.getElementById('pipe-ai-comment');
  if(!p){ section.style.display='none'; return; }
  section.style.display='block';
  const key = nagiPipeGetApiKey();
  if(!key){
    box.innerHTML = '<div class="card-title">🤖 AIからの補足コメント</div><div style="font-size:0.76rem;color:var(--sub);">APIキー未設定のため表示できません（<a href="./nagi_system.html" style="color:var(--accent3);">ハブ</a>の⚙データ管理から設定してください。設定済みの場合はブラウザ・端末が異なる可能性があります）</div>';
    return;
  }
  box.innerHTML = '<div class="card-title">🤖 AIからの補足コメント</div><div style="font-size:0.76rem;color:var(--sub);">生成中…</div>';
  callClaudeForPipeAI(buildPipeAIPrompt(p),
    text => { box.innerHTML = '<div class="card-title">🤖 AIからの補足コメント</div><div style="font-size:0.82rem;line-height:1.6;">'+text.replace(/</g,'&lt;')+'</div>'; },
    err => { box.innerHTML = '<div class="card-title">🤖 AIからの補足コメント</div><div style="font-size:0.76rem;color:var(--sub);">生成できませんでした（ルールベース表示のみ有効・上の「現在の状態」をご参照ください）：'+err+'</div>'; }
  );
}

// ════════════════════════════════════════════════════
//  全事業所パイプライン一覧・成約率ランキング・案件ステータス
//  （nagi_system.html の renderPipeTab() と同一ロジック・全事業所横断表示）
// ════════════════════════════════════════════════════
function renderAllOfficesPipe(){
  const allOffices=getAllOffices();
  const corps=getCorps();
  const pipeRows=allOffices.map(o=>{
    const p=getPipe(o.id);
    if(!p) return null;
    const corp=corps.find(c=>c.id===o.corpId);
    const rate=n(p.visit)?n(p.contract)/n(p.visit):null;
    return {corpName:corp?corp.name:'─',officeName:o.name,p,rate};
  }).filter(Boolean);

  if(!pipeRows.length){
    document.getElementById('pipe-summary').innerHTML='<div class="card"><div class="empty">パイプラインデータがありません。上の入力欄から入力してください。</div></div>';
    document.getElementById('pipe-ranking').innerHTML='';
    document.getElementById('pipe-status').innerHTML='';
    return;
  }

  let summaryHTML='<div class="card"><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:0.78rem;">';
  summaryHTML+='<thead><tr style="border-bottom:1px solid var(--border);color:var(--sub);">';
  summaryHTML+='<th style="text-align:left;padding:6px 8px;">法人</th><th style="text-align:left;padding:6px 8px;">事業所</th>';
  summaryHTML+='<th style="text-align:center;padding:6px 8px;">アプローチ</th><th style="text-align:center;padding:6px 8px;">問い合わせ</th>';
  summaryHTML+='<th style="text-align:center;padding:6px 8px;">見学</th><th style="text-align:center;padding:6px 8px;">成約</th>';
  summaryHTML+='<th style="text-align:center;padding:6px 8px;">リピート</th><th style="text-align:center;padding:6px 8px;">成約率</th>';
  summaryHTML+='</tr></thead><tbody>';
  pipeRows.forEach(({corpName,officeName,p,rate})=>{
    const rateStr=rate!==null?`<span style="font-weight:700;color:${rate>=0.3?'var(--accent2)':rate>=0.1?'var(--warn)':'var(--danger)'};">${(rate*100).toFixed(1)}%</span>`:'─';
    summaryHTML+=`<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:6px 8px;color:var(--sub);">${corpName}</td>
      <td style="padding:6px 8px;font-weight:600;">${officeName}</td>
      <td style="text-align:center;padding:6px 8px;">${n(p.approach)}</td>
      <td style="text-align:center;padding:6px 8px;">${n(p.inquiry)}</td>
      <td style="text-align:center;padding:6px 8px;">${n(p.visit)}</td>
      <td style="text-align:center;padding:6px 8px;">${n(p.contract)}</td>
      <td style="text-align:center;padding:6px 8px;">${n(p.repeat)}</td>
      <td style="text-align:center;padding:6px 8px;">${rateStr}</td>
    </tr>`;
  });
  summaryHTML+='</tbody></table></div></div>';
  document.getElementById('pipe-summary').innerHTML=summaryHTML;

  const ranked=[...pipeRows].filter(r=>r.rate!==null).sort((a,b)=>b.rate-a.rate);
  let rankHTML='<div class="card">';
  if(!ranked.length){
    rankHTML+='<div class="empty">成約データなし</div>';
  } else {
    ranked.forEach(({officeName,rate},i)=>{
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}位`;
      const col=rate>=0.3?'var(--accent2)':rate>=0.1?'var(--warn)':'var(--danger)';
      rankHTML+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.82rem;">
        <span style="min-width:28px;text-align:center;">${medal}</span>
        <span style="flex:1;">${officeName}</span>
        <span style="font-weight:700;color:${col};">${(rate*100).toFixed(1)}%</span>
      </div>`;
    });
  }
  rankHTML+='</div>';
  document.getElementById('pipe-ranking').innerHTML=rankHTML;

  const totals={approach:0,inquiry:0,visit:0,contract:0,repeat:0};
  pipeRows.forEach(({p})=>{
    totals.approach+=n(p.approach);
    totals.inquiry+=n(p.inquiry);
    totals.visit+=n(p.visit);
    totals.contract+=n(p.contract);
    totals.repeat+=n(p.repeat);
  });
  const stages=[
    {label:'アプローチ',key:'approach',icon:'📞'},
    {label:'問い合わせ',key:'inquiry',icon:'📧'},
    {label:'見学',key:'visit',icon:'👁'},
    {label:'成約',key:'contract',icon:'✅'},
    {label:'リピート',key:'repeat',icon:'🔄'},
  ];
  const maxVal=Math.max(...stages.map(s=>totals[s.key]),1);
  let statusHTML='<div class="card">';
  stages.forEach(s=>{
    const v=totals[s.key];
    const pct=Math.round(v/maxVal*100);
    statusHTML+=`<div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:0.8rem;">
        <span>${s.icon}</span><span style="flex:1;">${s.label}</span><span style="font-weight:700;">${v}件</span>
      </div>
      <div style="background:var(--surface);border-radius:4px;height:8px;overflow:hidden;">
        <div style="background:var(--accent3);height:8px;width:${pct}%;border-radius:4px;transition:width 0.3s;"></div>
      </div>
    </div>`;
  });
  statusHTML+='</div>';
  document.getElementById('pipe-status').innerHTML=statusHTML;
}

// ════════════════════════════════════════════════════
//  法人・事業所セレクタ（新規登録はハブ側で行う・ここは選択のみ）
// ════════════════════════════════════════════════════
function refreshCorpSelect(){
  const sel=document.getElementById('sel-corp');
  const cur=sel.value;
  sel.innerHTML='<option value="">── 選択 ──</option>'+getCorps().map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  if(cur) sel.value=cur;
}

function onCorpChange(){
  const corpId=document.getElementById('sel-corp').value;
  const officeSel=document.getElementById('sel-office');
  const corps=getCorps();
  officeSel.innerHTML='<option value="">── 選択 ──</option>'+getAllOffices().filter(o=>o.corpId===corpId).map(o=>{
    const c=corps.find(cc=>cc.id===o.corpId);
    return `<option value="${o.id}">${c?.name||''} / ${o.name}</option>`;
  }).join('');
  onOfficeChange();
}

function onOfficeChange(){
  const oid=document.getElementById('sel-office').value;
  const body=document.getElementById('pipe-body');
  const empty=document.getElementById('empty-state');
  if(!oid){ body.style.display='none'; empty.style.display='block'; return; }
  body.style.display='block'; empty.style.display='none';
  const off=getAllOffices().find(o=>o.id===oid);
  document.getElementById('office-label').textContent=off?.name||'';
  document.getElementById('office-label2').textContent=off?.name||'';
  loadPipeForm();
}

// ════════════════════════════════════════════════════
//  init
// ════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{
  refreshCorpSelect();
  onCorpChange();
  renderAllOfficesPipe();
});
</script>
</body>
</html>
