<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ミツメル 入力箱 — 柴山靖章専用</title>
<style>
  :root {
    --bg: #f5f1ea; --text: #2a2420; --text2: #5a5048; --text3: #8a7f74;
    --border: #ddd3c4; --accent: #8a6a3a; --red: #c0392b; --green: #1a7a52;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text);
    max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 18px; font-weight: 500; letter-spacing: 2px; margin-bottom: 4px; }
  p.sub { font-size: 12px; color: var(--text3); margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  textarea {
    width: 100%; min-height: 100px; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 15px; background: #fff; color: var(--text); resize: vertical; line-height: 1.6;
  }
  input[type=file] {
    width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: #fff; color: var(--text);
  }
  .drop-btn {
    display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 500;
    border: none; border-radius: 8px; cursor: pointer; margin-top: 8px;
    background: var(--accent); color: #fff;
  }
  .drop-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 13px; margin-top: 14px; min-height: 18px; text-align: center; }
  #status.ok { color: var(--green); }
  #status.err { color: var(--red); }
  .token-note { font-size: 11px; color: var(--text3); margin-top: 20px; text-align: center; }
</style>
</head>
<body>

<h1>入力箱</h1>
<p class="sub">今すぐ書き留めたいことを、テキスト・写真・PDFで投げ込んでください。整理はあとで構いません。</p>

<div class="field">
  <label>テキスト（任意）</label>
  <textarea id="inbox-text" placeholder="思いついたことをそのまま"></textarea>
</div>

<div class="field">
  <label>写真・PDF（任意）</label>
  <input type="file" id="inbox-file" accept="image/*,application/pdf">
</div>

<button class="drop-btn" id="drop-btn" onclick="dropToInbox()">投げ込む</button>
<div id="status"></div>

<p class="token-note">初回のみ、アクセストークンの入力が必要です。</p>

<script>
const SYNC_URL = 'https://mitsumeru-sync.fusion-partners-office.workers.dev';

function getPrivateToken() {
  let t = localStorage.getItem('mitsumeru_private_access_token');
  if (!t) {
    t = prompt('アクセストークンを入力してください（ミツメルPRIVATEの設定画面と同じもの）：');
    if (t) localStorage.setItem('mitsumeru_private_access_token', t.trim());
  }
  return (localStorage.getItem('mitsumeru_private_access_token') || '').trim();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function dropToInbox() {
  const textEl = document.getElementById('inbox-text');
  const fileEl = document.getElementById('inbox-file');
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('drop-btn');

  const text = textEl.value.trim();
  const file = fileEl.files[0];

  if (!text && !file) {
    statusEl.textContent = 'テキストか、写真・PDFのどちらかを入れてください。';
    statusEl.className = 'err';
    return;
  }

  const token = getPrivateToken();
  if (!token) {
    statusEl.textContent = 'アクセストークンが必要です。';
    statusEl.className = 'err';
    return;
  }

  btn.disabled = true;
  statusEl.textContent = '投げ込み中…';
  statusEl.className = '';

  try {
    const body = { token, text: text || '' };
    if (file) {
      body.fileName = file.name;
      body.fileType = file.type;
      body.fileData = await fileToBase64(file);
    }

    const res = await fetch(`${SYNC_URL}/inbox-drop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    if (data.ok) {
      statusEl.textContent = '✓ 投げ込みました。';
      statusEl.className = 'ok';
      textEl.value = '';
      fileEl.value = '';
    } else {
      statusEl.textContent = '投げ込めませんでした：' + (data.error || '不明なエラー');
      statusEl.className = 'err';
    }
  } catch (e) {
    statusEl.textContent = '通信エラー：' + e.message;
    statusEl.className = 'err';
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
