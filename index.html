<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3minエマージェンシー</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #f1f5f9;
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #root { width: 100%; max-width: 480px; min-height: 100vh; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease forwards; }

    /* grid cell */
    .cell {
      border: 1.5px solid #334155;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; text-align: center; line-height: 1.3;
      padding: 4px 2px;
      min-height: 44px;
      color: #94a3b8;
    }
    .cell.selected {
      background: #f59e0b22;
      border-color: #f59e0b;
      color: #f59e0b;
      font-weight: 700;
    }
    .cell:hover:not(.selected) { border-color: #64748b; color: #cbd5e1; }

    /* action button */
    .action-btn {
      background: none;
      border: 1.5px solid #334155;
      border-radius: 12px;
      color: #94a3b8;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      transition: all 0.15s;
      width: 100%;
    }
    .action-btn.selected {
      border-color: #f59e0b;
      color: #f59e0b;
      background: #f59e0b11;
    }
    .action-btn:hover:not(.selected) { border-color: #64748b; color: #e2e8f0; }

    /* primary button */
    .btn-primary {
      background: #f59e0b;
      color: #0f1117;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    .btn-ghost {
      background: none;
      border: 1.5px solid #334155;
      border-radius: 14px;
      color: #64748b;
      padding: 14px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: #64748b; color: #94a3b8; }

    /* range slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #334155;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #f59e0b;
      cursor: pointer;
    }

    /* textarea / input */
    .text-input {
      background: #1e2433;
      border: 1.5px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 20px;
      padding: 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      font-family: inherit;
    }
    .text-input:focus { border-color: #f59e0b; }
    .text-input::placeholder { color: #475569; }

    /* record card */
    .record-card {
      background: #1e2433;
      border-radius: 12px;
      padding: 14px 16px;
      border-left: 3px solid #f59e0b;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 定数 ──────────────────────────────────
const EMOTIONS = ['怒り', '不安', '悲しみ', '疲労', '混乱'];
const INTENSITIES = ['少し', 'まあまあ', 'かなり', 'とても', '限界'];
const CAUSES = ['人', '仕事', '身体', '環境', 'わからない'];
const ACTIONS = [
  '水を飲む',
  '外に出て空を見る',
  '深呼吸を3回する',
  '誰かに「今きつい」と一言だけ送る',
  '今の業務を5分止める',
  '何もしない（それでいい）',
];
const TIME_OPTIONS = [3, 5, 10, 15];

function genId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}
function now() { return new Date().toISOString(); }
function fmtTime(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function loadSessions() {
  try { return JSON.parse(localStorage.getItem('3me_sessions') || '[]'); }
  catch { return []; }
}
function saveSession(s) {
  const arr = loadSessions();
  arr.unshift(s);
  localStorage.setItem('3me_sessions', JSON.stringify(arr.slice(0, 50)));
}

// ── スクリーン0: スタート ──────────────────
function Screen0({ onStart, sessions }) {
  return (
    <div className="fade-in" style={{ padding: '40px 24px', display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      {/* ロゴ */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 24 }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 13, letterSpacing: '0.2em', color: '#f59e0b', marginBottom: 12 }}>3min Emergency</div>
          <div style={{ fontSize: 32, fontWeight: 800, lineHeight: 1.2, marginBottom: 8 }}>
            折れる前に、<br />3分だけ。
          </div>
          <div style={{ fontSize: 14, color: '#64748b', lineHeight: 1.7, marginTop: 12 }}>
            今の状態を3ステップで整理する。<br />
            精神論じゃない。デバッグだ。
          </div>
        </div>

        <div style={{ width: '100%', marginTop: 16 }}>
          <button className="btn-primary" onClick={onStart} style={{ fontSize: 19, padding: '20px' }}>
            今すぐ始める
          </button>
        </div>

        {sessions.length > 0 && (
          <div style={{ fontSize: 13, color: '#475569' }}>
            過去の記録：{sessions.length}件
          </div>
        )}
      </div>

      {/* 過去の記録（最新3件） */}
      {sessions.length > 0 && (
        <div style={{ paddingBottom: 24 }}>
          <div style={{ fontSize: 12, color: '#475569', marginBottom: 10, letterSpacing: '0.1em' }}>RECENT</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {sessions.slice(0, 3).map(s => (
              <div key={s.session_id} className="record-card">
                <div style={{ fontSize: 12, color: '#64748b', marginBottom: 4 }}>{fmtTime(s.timestamp)}</div>
                <div style={{ fontSize: 14, color: '#cbd5e1' }}>「{s.hokoku.text}」</div>
                <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>
                  → {s.sodan.action}（{s.sodan.time_minutes}分後）
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── プログレスバー ─────────────────────────
function ProgressBar({ step }) {
  const labels = ['報告', '連絡', '相談'];
  return (
    <div style={{ display: 'flex', gap: 6, padding: '0 24px 0' }}>
      {labels.map((l, i) => (
        <div key={l} style={{ flex: 1, textAlign: 'center' }}>
          <div style={{
            height: 3, borderRadius: 2,
            background: i < step ? '#f59e0b' : (i === step - 1 ? '#f59e0b' : '#1e2433'),
            marginBottom: 4,
          }} />
          <div style={{ fontSize: 10, color: i <= step - 1 ? '#f59e0b' : '#334155' }}>{l}</div>
        </div>
      ))}
    </div>
  );
}

// ── スクリーン1: 報告 ──────────────────────
function Screen1({ value, onChange, onNext }) {
  const ref = useRef();
  useEffect(() => { setTimeout(() => ref.current?.focus(), 300); }, []);
  const max = 20;
  const len = [...value].length;
  const ok = len > 0 && len <= max;

  function handleKey(e) {
    if (e.key === 'Enter' && ok) { e.preventDefault(); onNext(); }
  }

  return (
    <div className="fade-in" style={{ padding: '32px 24px', display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <ProgressBar step={1} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 24 }}>
        <div>
          <div style={{ fontSize: 13, color: '#f59e0b', letterSpacing: '0.15em', marginBottom: 8 }}>報告 ─ HŌKOKU</div>
          <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1.4 }}>
            今、何が起きていますか？
          </div>
          <div style={{ fontSize: 13, color: '#475569', marginTop: 6 }}>20字以内で。うまく書かなくていい。</div>
        </div>

        <div>
          <textarea
            ref={ref}
            className="text-input"
            rows={3}
            maxLength={max}
            value={value}
            onChange={e => onChange(e.target.value)}
            onKeyDown={handleKey}
            placeholder="例：上司に怒鳴られた"
          />
          <div style={{ textAlign: 'right', fontSize: 12, color: len > max ? '#ef4444' : '#475569', marginTop: 6 }}>
            {len} / {max}
          </div>
        </div>

        <div style={{ fontSize: 12, color: '#334155', textAlign: 'center' }}>Enterキーでも次へ進めます</div>
      </div>

      <div style={{ paddingBottom: 32 }}>
        <button className="btn-primary" disabled={!ok} onClick={onNext}>次へ →</button>
      </div>
    </div>
  );
}

// ── スクリーン2: 連絡 ──────────────────────
function Screen2({ emotions, cause, onToggleEmotion, onCause, onNext, onBack }) {
  return (
    <div className="fade-in" style={{ padding: '32px 24px', display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <ProgressBar step={2} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 24, overflowY: 'auto', paddingTop: 24 }}>
        <div>
          <div style={{ fontSize: 13, color: '#f59e0b', letterSpacing: '0.15em', marginBottom: 8 }}>連絡 ─ RENRAKU</div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>今の状態は？</div>
          <div style={{ fontSize: 13, color: '#475569', marginTop: 4 }}>当てはまるものをタップ（複数OK）</div>
        </div>

        {/* 感情グリッド */}
        <div>
          {/* ヘッダー行 */}
          <div style={{ display: 'grid', gridTemplateColumns: '52px repeat(5, 1fr)', gap: 4, marginBottom: 4 }}>
            <div />
            {INTENSITIES.map(i => (
              <div key={i} style={{ fontSize: 10, color: '#475569', textAlign: 'center' }}>{i}</div>
            ))}
          </div>
          {/* データ行 */}
          {EMOTIONS.map((em, ei) => (
            <div key={em} style={{ display: 'grid', gridTemplateColumns: '52px repeat(5, 1fr)', gap: 4, marginBottom: 4 }}>
              <div style={{ display: 'flex', alignItems: 'center', fontSize: 13, color: '#94a3b8' }}>{em}</div>
              {INTENSITIES.map((_, ii) => {
                const key = `${ei}-${ii}`;
                const sel = emotions.includes(key);
                return (
                  <div
                    key={key}
                    className={`cell ${sel ? 'selected' : ''}`}
                    onClick={() => onToggleEmotion(key)}
                  >
                    {sel ? '✓' : ''}
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        {/* 原因 */}
        <div>
          <div style={{ fontSize: 14, color: '#94a3b8', marginBottom: 10 }}>原因は何だと思いますか？</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {CAUSES.map(c => (
              <button
                key={c}
                onClick={() => onCause(c)}
                style={{
                  padding: '8px 16px',
                  borderRadius: 20,
                  border: `1.5px solid ${cause === c ? '#f59e0b' : '#334155'}`,
                  background: cause === c ? '#f59e0b22' : 'none',
                  color: cause === c ? '#f59e0b' : '#64748b',
                  cursor: 'pointer',
                  fontSize: 13,
                  fontWeight: cause === c ? 700 : 400,
                  transition: 'all 0.15s',
                }}
              >
                {c}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ paddingBottom: 32, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button className="btn-primary" onClick={onNext}>次へ →</button>
        <button className="btn-ghost" onClick={onBack}>← 戻る</button>
      </div>
    </div>
  );
}

// ── スクリーン3: 相談 ──────────────────────
function Screen3({ action, timeMin, onAction, onTime, onDone, onBack }) {
  const tIdx = TIME_OPTIONS.indexOf(timeMin);
  return (
    <div className="fade-in" style={{ padding: '32px 24px', display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <ProgressBar step={3} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 24, overflowY: 'auto', paddingTop: 24 }}>
        <div>
          <div style={{ fontSize: 13, color: '#f59e0b', letterSpacing: '0.15em', marginBottom: 8 }}>相談 ─ SŌDAN</div>
          <div style={{ fontSize: 20, fontWeight: 700, lineHeight: 1.4 }}>
            次の{timeMin}分で、<br />これだけやる。
          </div>
          <div style={{ fontSize: 13, color: '#475569', marginTop: 4 }}>1つだけ選ぶ。それでいい。</div>
        </div>

        {/* 行動選択 */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {ACTIONS.map(a => (
            <button
              key={a}
              className={`action-btn ${action === a ? 'selected' : ''}`}
              onClick={() => onAction(a)}
            >
              {action === a ? '▶ ' : '　'}{a}
            </button>
          ))}
        </div>

        {/* 時間スライダー */}
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
            <span style={{ fontSize: 14, color: '#94a3b8' }}>見直すまでの時間</span>
            <span style={{ fontSize: 18, fontWeight: 700, color: '#f59e0b' }}>{timeMin}分</span>
          </div>
          <input
            type="range" min={0} max={3} step={1} value={tIdx}
            onChange={e => onTime(TIME_OPTIONS[+e.target.value])}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
            {TIME_OPTIONS.map(t => (
              <span key={t} style={{ fontSize: 11, color: t === timeMin ? '#f59e0b' : '#334155' }}>{t}分</span>
            ))}
          </div>
        </div>
      </div>

      <div style={{ paddingBottom: 32, display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button className="btn-primary" disabled={!action} onClick={onDone}>完了 ✓</button>
        <button className="btn-ghost" onClick={onBack}>← 戻る</button>
      </div>
    </div>
  );
}

// ── スクリーン4: 完了 ──────────────────────
function Screen4({ session, onSave, saved, onAgain, onClose }) {
  const topEmotion = () => {
    if (!session.renraku.emotions.length) return 'なし';
    const [ei, ii] = session.renraku.emotions[0].split('-').map(Number);
    return `${EMOTIONS[ei]}（${INTENSITIES[ii]}）`;
  };

  return (
    <div className="fade-in" style={{ padding: '40px 24px', display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 32 }}>
        {/* 完了メッセージ */}
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>✓</div>
          <div style={{ fontSize: 22, fontWeight: 800, lineHeight: 1.4 }}>
            3分間、よくやった。
          </div>
          <div style={{ fontSize: 14, color: '#64748b', marginTop: 8 }}>
            {session.sodan.time_minutes}分後にもう一度確認しよう。
          </div>
        </div>

        {/* サマリー */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <div className="record-card">
            <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>報告</div>
            <div style={{ fontSize: 16, color: '#f1f5f9' }}>「{session.hokoku.text}」</div>
          </div>
          <div className="record-card">
            <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>連絡</div>
            <div style={{ fontSize: 14, color: '#f1f5f9' }}>
              {topEmotion()}
              {session.renraku.cause && <span style={{ color: '#64748b' }}>　原因：{session.renraku.cause}</span>}
            </div>
          </div>
          <div className="record-card">
            <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>相談</div>
            <div style={{ fontSize: 14, color: '#f1f5f9' }}>
              {session.sodan.action}
              <span style={{ color: '#64748b' }}>　{session.sodan.time_minutes}分後に確認</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{ paddingBottom: 32, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {!saved ? (
          <button className="btn-primary" onClick={onSave}>この記録を保存する</button>
        ) : (
          <div style={{ textAlign: 'center', color: '#f59e0b', fontSize: 14, padding: '14px' }}>
            ✓ 保存しました
          </div>
        )}
        <button className="btn-ghost" onClick={onAgain}>もう一度</button>
        <button className="btn-ghost" onClick={onClose}>閉じる（スタートに戻る）</button>
      </div>
    </div>
  );
}

// ── メインアプリ ─────────────────────────
function App() {
  const [screen, setScreen] = useState(0);
  const [sessions, setSessions] = useState(loadSessions);

  // フォームデータ
  const [hokoku, setHokoku] = useState('');
  const [emotions, setEmotions] = useState([]);
  const [cause, setCause] = useState('');
  const [action, setAction] = useState('');
  const [timeMin, setTimeMin] = useState(5);
  const [saved, setSaved] = useState(false);
  const [currentSession, setCurrentSession] = useState(null);

  function toggleEmotion(key) {
    setEmotions(prev =>
      prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
    );
  }

  function buildSession() {
    return {
      session_id: genId(),
      timestamp: now(),
      hokoku: { text: hokoku },
      renraku: {
        emotions: emotions.map(k => {
          const [ei, ii] = k.split('-').map(Number);
          return { category: EMOTIONS[ei], intensity: ii + 1, key: k };
        }),
        cause,
      },
      sodan: { action, time_minutes: timeMin },
      completed: true,
    };
  }

  function handleDone() {
    const s = buildSession();
    setCurrentSession(s);
    setScreen(4);
  }

  function handleSave() {
    if (!currentSession) return;
    saveSession(currentSession);
    setSessions(loadSessions());
    setSaved(true);
  }

  function handleAgain() {
    setHokoku(''); setEmotions([]); setCause('');
    setAction(''); setTimeMin(5); setSaved(false); setCurrentSession(null);
    setScreen(1);
  }

  function handleClose() {
    setHokoku(''); setEmotions([]); setCause('');
    setAction(''); setTimeMin(5); setSaved(false); setCurrentSession(null);
    setSessions(loadSessions());
    setScreen(0);
  }

  return (
    <>
      {screen === 0 && <Screen0 onStart={() => setScreen(1)} sessions={sessions} />}
      {screen === 1 && <Screen1 value={hokoku} onChange={setHokoku} onNext={() => setScreen(2)} />}
      {screen === 2 && (
        <Screen2
          emotions={emotions}
          cause={cause}
          onToggleEmotion={toggleEmotion}
          onCause={c => setCause(prev => prev === c ? '' : c)}
          onNext={() => setScreen(3)}
          onBack={() => setScreen(1)}
        />
      )}
      {screen === 3 && (
        <Screen3
          action={action}
          timeMin={timeMin}
          onAction={a => setAction(prev => prev === a ? '' : a)}
          onTime={setTimeMin}
          onDone={handleDone}
          onBack={() => setScreen(2)}
        />
      )}
      {screen === 4 && currentSession && (
        <Screen4
          session={currentSession}
          onSave={handleSave}
          saved={saved}
          onAgain={handleAgain}
          onClose={handleClose}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
