<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>奏 1on1・育成サポート — Fusion Partners</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232d7a52'/><text x='16' y='24' font-size='18' text-anchor='middle'>🌱</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f1ea;
    --bg2: #ede8df;
    --border: #c8b89a;
    --text: #3a3028;
    --text2: #6a5a4a;
    --text3: #9a8a7a;
    --accent: #8a7a6a;
    --green: #2d7a52;
    --red: #c0392b;
    --gold: #b8860b;
    --card: #faf7f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .header {
    background: var(--text);
    color: var(--bg);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header h1 { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 400; letter-spacing: 3px; }
  .header span { font-size: 11px; color: var(--border); letter-spacing: 2px; }

  .mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 55px;
    z-index: 99;
    flex-wrap: wrap;
  }
  .mode-tab {
    flex: 1; min-width: 90px; padding: 12px 6px; text-align: center; font-size: 12px;
    cursor: pointer; border: none; background: none; color: var(--text3);
    letter-spacing: 0.5px; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); font-weight: 500; }

  .screen { display: none; padding: 18px 16px; max-width: 820px; margin: 0 auto; }
  .screen.active { display: block; }

  .section {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }
  .note { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; color: var(--text); font-size: 13px; font-family: inherit;
  }
  .field textarea { min-height: 70px; resize: vertical; }
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 160px; }

  .btn-primary {
    background: var(--text); color: var(--bg); border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 13px; cursor: pointer; letter-spacing: 1px;
  }
  .btn-secondary {
    background: none; color: var(--text2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 16px; font-size: 12px; cursor: pointer; letter-spacing: 0.5px;
  }
  .btn-danger { color: var(--red); border-color: var(--red); }

  .item-card {
    background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    margin-bottom: 8px;
  }
  .item-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .item-date { font-weight: 500; font-size: 13px; color: var(--text2); }
  .item-actions button { font-size: 11px; padding: 4px 8px; }

  .grow-label { display:inline-block; font-size:10px; font-weight:500; color:#fff; background:var(--accent); border-radius:3px; padding:1px 6px; margin-right:6px; }
  .prev-will-box { background: #fdf3e0; border: 1px solid var(--gold); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 13px; }

  .empty-state { text-align: center; color: var(--text3); font-size: 12px; padding: 30px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>奏 — 1on1・育成サポート</h1>
  <span>KANADE GROWTH · MVP</span>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchTab('oneonone')">💬 1on1記録</button>
  <button class="mode-tab" onclick="switchTab('ojt')">📘 OJT計画</button>
  <button class="mode-tab" onclick="switchTab('feedback')">📣 フィードバック記録</button>
</div>

<!-- ══════════ CO-1＋CO-2：1on1記録シート（GROWモデル） ══════════ -->
<div id="screen-oneonone" class="screen active">
  <div class="section">
    <div class="section-title">対象施設・対象職員</div>
    <div class="field-row">
      <div class="field"><label>施設</label><select id="oo-facility-select" onchange="onOneOnOneFacilityChange()"></select></div>
      <div class="field"><label>職員</label><select id="oo-staff-select" onchange="onOneOnOneStaffChange()"></select></div>
    </div>
    <div class="note">既存の奏・勤務表自動作成ツール（`kanade_shift.html`）の施設マスタ・職員マスタを読み取り専用で参照しています。</div>
  </div>

  <div id="oo-prev-will-area"></div>

  <div class="section">
    <div class="section-title">今回の1on1記録（GROWモデル）</div>
    <div class="field"><label>実施日</label><input type="date" id="oo-date"></div>
    <div class="field"><label><span class="grow-label">G</span>Goal（目標・今回のテーマ）</label><textarea id="oo-goal" placeholder="今回の面談で扱いたいテーマ・達成したい状態"></textarea></div>
    <div class="field"><label><span class="grow-label">R</span>Reality（現状）</label><textarea id="oo-reality" placeholder="現状どうなっているか、事実ベースで"></textarea></div>
    <div class="field"><label><span class="grow-label">O</span>Options（選択肢）</label><textarea id="oo-options" placeholder="考えられる選択肢・打ち手"></textarea></div>
    <div class="field"><label><span class="grow-label">W</span>Will（次のアクション）</label><textarea id="oo-will" placeholder="次回までに実際にやると決めたこと"></textarea></div>
    <button class="btn-primary" onclick="saveOneOnOne()">この回を保存する</button>
    <div id="oo-save-msg" class="note" style="margin-top:8px;"></div>
  </div>

  <div id="oo-history-area"></div>
</div>

<!-- ══════════ CO-3：OJT計画フォーマット ══════════ -->
<div id="screen-ojt" class="screen">
  <div class="section">
    <div class="section-title">対象施設・対象職員</div>
    <div class="field-row">
      <div class="field"><label>施設</label><select id="ojt-facility-select" onchange="onOjtFacilityChange()"></select></div>
      <div class="field"><label>職員</label><select id="ojt-staff-select" onchange="renderOjtHistory()"></select></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">新規OJT計画</div>
    <div class="field"><label>実施日</label><input type="date" id="ojt-date"></div>
    <div class="field"><label>目的</label><textarea id="ojt-purpose" placeholder="このOJTで何を身につけてもらいたいか"></textarea></div>
    <div class="field"><label>到達基準</label><textarea id="ojt-criteria" placeholder="どうなったら「できた」と言えるか（具体的・観察可能な基準）"></textarea></div>
    <div class="field"><label>手順</label><textarea id="ojt-steps" placeholder="実際の作業手順・ステップ"></textarea></div>
    <div class="field"><label>コツ</label><textarea id="ojt-tips" placeholder="つまずきやすい点・うまくいくコツ"></textarea></div>
    <button class="btn-primary" onclick="saveOjt()">この計画を保存する</button>
    <div id="ojt-save-msg" class="note" style="margin-top:8px;"></div>
  </div>
  <div id="ojt-history-area"></div>
</div>

<!-- ══════════ CO-4：フィードバック記録（SBIモデル） ══════════ -->
<div id="screen-feedback" class="screen">
  <div class="section">
    <div class="section-title">対象施設・対象職員</div>
    <div class="field-row">
      <div class="field"><label>施設</label><select id="fb-facility-select" onchange="onFeedbackFacilityChange()"></select></div>
      <div class="field"><label>職員</label><select id="fb-staff-select" onchange="renderFeedbackHistory()"></select></div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">新規フィードバック（SBIモデル）</div>
    <div class="field"><label>実施日</label><input type="date" id="fb-date"></div>
    <div class="field"><label><span class="grow-label">S</span>Situation（状況）</label><textarea id="fb-situation" placeholder="いつ・どこで起きたことか"></textarea></div>
    <div class="field"><label><span class="grow-label">B</span>Behavior（行動）</label><textarea id="fb-behavior" placeholder="本人が実際に取った行動（事実のみ・評価を混ぜない）"></textarea></div>
    <div class="field"><label><span class="grow-label">I</span>Impact（影響）</label><textarea id="fb-impact" placeholder="その行動がチーム・利用者・自分自身にもたらした影響"></textarea></div>
    <button class="btn-primary" onclick="saveFeedback()">このフィードバックを保存する</button>
    <div id="fb-save-msg" class="note" style="margin-top:8px;"></div>
  </div>
  <div id="fb-history-area"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// データ層
// 施設・職員マスタはkanade_shift.htmlのlocalStorageキーを読み取り専用で参照する
// ═══════════════════════════════════════════════
function loadFacilitiesReadOnly() {
  try { return JSON.parse(localStorage.getItem('kanade_shift_facilities') || '[]'); } catch(e) { return []; }
}
function loadStaffReadOnly() {
  try { return JSON.parse(localStorage.getItem('kanade_shift_staff') || '[]'); } catch(e) { return []; }
}

let facilities = loadFacilitiesReadOnly();
let staffList = loadStaffReadOnly();

// CO-1／CO-2：1on1記録（GROWモデル）
function oneOnOneKey(staffId) { return 'kanade_1on1_' + staffId; }
function loadOneOnOne(staffId) {
  try { return JSON.parse(localStorage.getItem(oneOnOneKey(staffId)) || '[]'); } catch(e) { return []; }
}
function saveOneOnOneList(staffId, list) { localStorage.setItem(oneOnOneKey(staffId), JSON.stringify(list)); }

// CO-3：OJT計画
function ojtKey(staffId) { return 'kanade_ojt_' + staffId; }
function loadOjt(staffId) {
  try { return JSON.parse(localStorage.getItem(ojtKey(staffId)) || '[]'); } catch(e) { return []; }
}
function saveOjtList(staffId, list) { localStorage.setItem(ojtKey(staffId), JSON.stringify(list)); }

// CO-4：フィードバック記録（SBIモデル）
function feedbackKey(staffId) { return 'kanade_feedback_' + staffId; }
function loadFeedback(staffId) {
  try { return JSON.parse(localStorage.getItem(feedbackKey(staffId)) || '[]'); } catch(e) { return []; }
}
function saveFeedbackList(staffId, list) { localStorage.setItem(feedbackKey(staffId), JSON.stringify(list)); }

// ═══════════════════════════════════════════════
// タブ切替
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['oneonone','ojt','feedback'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  facilities = loadFacilitiesReadOnly();
  staffList = loadStaffReadOnly();
  if (tab === 'oneonone') { populateFacilitySelect('oo-facility-select'); onOneOnOneFacilityChange(); }
  if (tab === 'ojt')      { populateFacilitySelect('ojt-facility-select'); onOjtFacilityChange(); }
  if (tab === 'feedback') { populateFacilitySelect('fb-facility-select'); onFeedbackFacilityChange(); }
}

function populateFacilitySelect(selectId) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  sel.innerHTML = facilities.length
    ? facilities.map(f => `<option value="${f.id}">${f.name}</option>`).join('')
    : '<option value="">（施設未登録・先にkanade_shift.htmlで登録してください）</option>';
  if (facilities.some(f => f.id === current)) sel.value = current;
}
function populateStaffSelect(selectId, facilityId) {
  const sel = document.getElementById(selectId);
  const list = staffList.filter(s => s.facilityId === facilityId);
  sel.innerHTML = list.length
    ? list.map(s => `<option value="${s.id}">${s.name}（${s.role}）</option>`).join('')
    : '<option value="">（職員未登録）</option>';
}

// ═══════════════════════════════════════════════
// CO-1＋CO-2：1on1記録シート
// ═══════════════════════════════════════════════
function onOneOnOneFacilityChange() {
  const fid = document.getElementById('oo-facility-select').value;
  populateStaffSelect('oo-staff-select', fid);
  onOneOnOneStaffChange();
}

function onOneOnOneStaffChange() {
  const staffId = document.getElementById('oo-staff-select').value;
  const prevArea = document.getElementById('oo-prev-will-area');
  const list = staffId ? loadOneOnOne(staffId) : [];
  if (list.length) {
    const prev = list[list.length - 1];
    prevArea.innerHTML = `<div class="prev-will-box">📌 前回（${prev.date}）のWill（決めたネクストアクション）：<br>${(prev.will||'（未記入）').replace(/\n/g,'<br>')}</div>`;
  } else {
    prevArea.innerHTML = '';
  }
  renderOneOnOneHistory();
}

function saveOneOnOne() {
  const staffId = document.getElementById('oo-staff-select').value;
  const date = document.getElementById('oo-date').value;
  const msg = document.getElementById('oo-save-msg');
  if (!staffId) { alert('職員を選択してください。'); return; }
  if (!date) { alert('実施日を入力してください。'); return; }
  const entry = {
    date,
    goal: document.getElementById('oo-goal').value,
    reality: document.getElementById('oo-reality').value,
    options: document.getElementById('oo-options').value,
    will: document.getElementById('oo-will').value,
  };
  const list = loadOneOnOne(staffId);
  list.push(entry);
  list.sort((a,b) => a.date.localeCompare(b.date));
  saveOneOnOneList(staffId, list);
  msg.textContent = `${date}分を保存しました。`;
  msg.style.color = 'var(--green)';
  ['oo-goal','oo-reality','oo-options','oo-will'].forEach(id => document.getElementById(id).value = '');
  onOneOnOneStaffChange();
}

function renderOneOnOneHistory() {
  const staffId = document.getElementById('oo-staff-select').value;
  const area = document.getElementById('oo-history-area');
  if (!staffId) { area.innerHTML = ''; return; }
  const list = loadOneOnOne(staffId);
  if (!list.length) { area.innerHTML = '<div class="section"><div class="empty-state">この職員の1on1記録はまだありません</div></div>'; return; }
  const cards = list.slice().reverse().map(e => `
    <div class="item-card">
      <div class="item-card-header"><span class="item-date">${e.date}</span></div>
      <div><span class="grow-label">G</span>${(e.goal||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><span class="grow-label">R</span>${(e.reality||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><span class="grow-label">O</span>${(e.options||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><span class="grow-label">W</span>${(e.will||'').replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  area.innerHTML = `<div class="section"><div class="section-title">これまでの1on1記録（${list.length}件）</div>${cards}</div>`;
}

// ═══════════════════════════════════════════════
// CO-3：OJT計画フォーマット
// ═══════════════════════════════════════════════
function onOjtFacilityChange() {
  const fid = document.getElementById('ojt-facility-select').value;
  populateStaffSelect('ojt-staff-select', fid);
  renderOjtHistory();
}

function saveOjt() {
  const staffId = document.getElementById('ojt-staff-select').value;
  const date = document.getElementById('ojt-date').value;
  const msg = document.getElementById('ojt-save-msg');
  if (!staffId) { alert('職員を選択してください。'); return; }
  if (!date) { alert('実施日を入力してください。'); return; }
  const entry = {
    date,
    purpose: document.getElementById('ojt-purpose').value,
    criteria: document.getElementById('ojt-criteria').value,
    steps: document.getElementById('ojt-steps').value,
    tips: document.getElementById('ojt-tips').value,
  };
  const list = loadOjt(staffId);
  list.push(entry);
  list.sort((a,b) => a.date.localeCompare(b.date));
  saveOjtList(staffId, list);
  msg.textContent = `${date}分を保存しました。`;
  msg.style.color = 'var(--green)';
  ['ojt-purpose','ojt-criteria','ojt-steps','ojt-tips'].forEach(id => document.getElementById(id).value = '');
  renderOjtHistory();
}

function renderOjtHistory() {
  const staffId = document.getElementById('ojt-staff-select').value;
  const area = document.getElementById('ojt-history-area');
  if (!staffId) { area.innerHTML = ''; return; }
  const list = loadOjt(staffId);
  if (!list.length) { area.innerHTML = '<div class="section"><div class="empty-state">この職員のOJT計画はまだありません</div></div>'; return; }
  const cards = list.slice().reverse().map(e => `
    <div class="item-card">
      <div class="item-card-header"><span class="item-date">${e.date}</span></div>
      <div><b>目的：</b>${(e.purpose||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><b>到達基準：</b>${(e.criteria||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><b>手順：</b>${(e.steps||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><b>コツ：</b>${(e.tips||'').replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  area.innerHTML = `<div class="section"><div class="section-title">これまでのOJT計画（${list.length}件）</div>${cards}</div>`;
}

// ═══════════════════════════════════════════════
// CO-4：フィードバック記録（SBIモデル）
// ═══════════════════════════════════════════════
function onFeedbackFacilityChange() {
  const fid = document.getElementById('fb-facility-select').value;
  populateStaffSelect('fb-staff-select', fid);
  renderFeedbackHistory();
}

function saveFeedback() {
  const staffId = document.getElementById('fb-staff-select').value;
  const date = document.getElementById('fb-date').value;
  const msg = document.getElementById('fb-save-msg');
  if (!staffId) { alert('職員を選択してください。'); return; }
  if (!date) { alert('実施日を入力してください。'); return; }
  const entry = {
    date,
    situation: document.getElementById('fb-situation').value,
    behavior: document.getElementById('fb-behavior').value,
    impact: document.getElementById('fb-impact').value,
  };
  const list = loadFeedback(staffId);
  list.push(entry);
  list.sort((a,b) => a.date.localeCompare(b.date));
  saveFeedbackList(staffId, list);
  msg.textContent = `${date}分を保存しました。`;
  msg.style.color = 'var(--green)';
  ['fb-situation','fb-behavior','fb-impact'].forEach(id => document.getElementById(id).value = '');
  renderFeedbackHistory();
}

function renderFeedbackHistory() {
  const staffId = document.getElementById('fb-staff-select').value;
  const area = document.getElementById('fb-history-area');
  if (!staffId) { area.innerHTML = ''; return; }
  const list = loadFeedback(staffId);
  if (!list.length) { area.innerHTML = '<div class="section"><div class="empty-state">この職員のフィードバック記録はまだありません</div></div>'; return; }
  const cards = list.slice().reverse().map(e => `
    <div class="item-card">
      <div class="item-card-header"><span class="item-date">${e.date}</span></div>
      <div><span class="grow-label">S</span>${(e.situation||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><span class="grow-label">B</span>${(e.behavior||'').replace(/\n/g,'<br>')}</div>
      <div style="margin-top:6px;"><span class="grow-label">I</span>${(e.impact||'').replace(/\n/g,'<br>')}</div>
    </div>`).join('');
  area.innerHTML = `<div class="section"><div class="section-title">これまでのフィードバック記録（${list.length}件）</div>${cards}</div>`;
}

// ═══════════════════════════════════════════════
// 起動時
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('oo-date').value = today;
  document.getElementById('ojt-date').value = today;
  document.getElementById('fb-date').value = today;
  populateFacilitySelect('oo-facility-select');
  onOneOnOneFacilityChange();
});
</script>
</body>
</html>
