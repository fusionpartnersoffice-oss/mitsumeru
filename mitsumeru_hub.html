<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミツメル Mitsumeru — ツール一覧 | Fusion Partners</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EDE8; --bg2:#FAF8F4; --navy:#0b1929; --navy2:#1c3248;
  --gold:#7d6428; --gold2:#9e7f34; --gold3:#c9a850;
  --text:#1a2535; --dim:#536070; --dim2:#8a98a8; --border:#d8d2c8;
  --shadow:0 2px 16px rgba(0,0,0,.06);
}
html,body{background:var(--bg);font-family:'Hiragino Mincho ProN','Yu Mincho','Georgia',serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%;}
.wrap{max-width:760px;margin:0 auto;padding:56px 28px 72px;}
.back{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:12px;color:var(--dim);text-decoration:none;letter-spacing:.5px;display:inline-block;margin-bottom:28px;}
.back:hover{color:var(--gold2);}
.head{margin-bottom:40px;}
.eyebrow{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);margin-bottom:12px;font-weight:500;}
.h1{font-size:clamp(30px,5vw,44px);font-weight:300;letter-spacing:-.5px;line-height:1.2;color:var(--navy);}
.h1 .jp{font-weight:400;}
.tagline{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:13px;color:var(--dim);line-height:1.9;margin-top:14px;}
.rule{width:32px;height:2px;background:var(--gold3);margin:20px 0;}
.list{display:flex;flex-direction:column;gap:14px;}
.card{display:block;padding:22px 24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);box-shadow:var(--shadow);border-left:3px solid var(--gold3);text-decoration:none;color:inherit;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(11,25,41,.12);border-left-color:var(--navy);}
.card-badge{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:9.5px;letter-spacing:2px;color:var(--gold2);text-transform:uppercase;margin-bottom:6px;}
.card-name{font-size:clamp(17px,2.4vw,20px);font-weight:400;color:var(--navy);margin-bottom:6px;}
.card-desc{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:12.5px;color:var(--dim);line-height:1.75;}
.card-go{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--gold2);margin-top:10px;display:inline-block;}
.foot{margin-top:52px;text-align:center;border-top:1px solid var(--border);padding-top:24px;}
.foot-contact{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;font-size:11px;color:var(--dim);letter-spacing:.5px;line-height:1.9;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="./index_fusionos.html">← FusionOS 全体へ戻る</a>
  <header class="head">
    <div class="eyebrow">Fusion OS — 05／折れない</div>
    <h1 class="h1"><span class="jp">ミツメル</span> Mitsumeru</h1>
    <div class="rule"></div>
    <div class="tagline">管理職の「耐久設計」。日次HP/MP監査・翌日戦略を一元化し、仕組みを動かす人を守る。</div>
  </header>

  <div class="list">
    <a class="card" href="./mitsumeru_app.html">
      <div class="card-badge">本体</div>
      <div class="card-name">mitsumeru_app.html — 日次ジャーナリング・翌日戦略</div>
      <div class="card-desc">HP/MP監査・参謀からの一言・翌日戦略立案の中核ツール。</div>
      <span class="card-go">開く →</span>
    </a>
    <a class="card" href="./mitsumeru_lite.html">
      <div class="card-badge">商品版</div>
      <div class="card-name">mitsumeru_lite.html — ミツメル Lite</div>
      <div class="card-desc">崩れる前に気づく朝の一言。一般ユーザー向けに機能を絞った商品版。</div>
      <span class="card-go">開く →</span>
    </a>
  </div>

  <footer class="foot">
    <div class="foot-contact">Fusion Partners　｜　fusion.partners.office@gmail.com</div>
  </footer>
</div>
</body>
</html>
