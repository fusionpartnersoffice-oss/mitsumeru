<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弦 Yuzuru — ツール一覧 | Fusion Partners</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#eef1f4; --panel:#ffffff; --navy:#0b1929; --navy2:#1c3248;
  --text:#1a2535; --dim:#5b6b7a; --dim2:#8a98a8; --border:#dde3e8;
}
html,body{background:var(--bg);font-family:'Hiragino Kaku Gothic Pro','Meiryo','Yu Gothic',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%;font-size:14px;}
.topbar{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{color:#fff;text-decoration:none;font-weight:700;font-size:13px;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
.topbar-back{color:#8fa3b8;text-decoration:none;font-size:11.5px;}
.topbar-back:hover{color:#fff;}
.wrap{max-width:780px;margin:0 auto;padding:28px 24px 64px;}
.head{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.eyebrow{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--dim2);margin-bottom:6px;font-weight:600;}
.h1{font-size:20px;font-weight:700;letter-spacing:-.2px;color:var(--navy);}
.tagline{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.7;}
.list{display:flex;flex-direction:column;gap:10px;}
.card{display:block;padding:16px 18px;border:1px solid var(--border);border-radius:5px;background:var(--panel);border-left:3px solid var(--navy2);text-decoration:none;color:inherit;transition:border-left-color .12s ease,background .12s ease;}
.card:hover{border-left-color:var(--navy);background:#fff;}
.card-badge{font-size:9.5px;letter-spacing:1.5px;color:var(--dim2);text-transform:uppercase;margin-bottom:5px;font-weight:600;}
.card-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.card-desc{font-size:11.5px;color:var(--dim);line-height:1.6;}
.card-go{font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--navy);margin-top:8px;display:inline-block;}
.note{font-size:11px;color:var(--dim2);line-height:1.7;margin-top:16px;}
.foot{margin-top:28px;text-align:center;border-top:1px solid var(--border);padding-top:16px;}
.foot-contact{font-size:10.5px;color:var(--dim2);letter-spacing:.3px;}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-brand">🧭 FusionOS</span>
  <a class="topbar-back" href="./index_full.html">← ホームへ</a>
</div>
<div class="wrap">
  <header class="head">
    <div class="eyebrow">Fusion OS — 04／売る</div>
    <h1 class="h1">弦 Yuzuru</h1>
    <div class="tagline">地域連携と「自動営業」。施設データから営業先リストとマップを自動生成して届ける。</div>
  </header>

  <div class="list">
    <a class="card" href="./yuzuru_map.html">
      <div class="card-badge">商圏マップ</div>
      <div class="card-name">yuzuru_map.html — 商圏マップ（東海3県・実データ）</div>
      <div class="card-desc">営業進捗・施設状態・紹介元カテゴリでフィルタできる地図と、営業リストを一体化。</div>
      <span class="card-go">開く →</span>
    </a>
  </div>

  <div class="note">※ 現時点で弦は本ツール1本のみです。今後の拡張時にここへ追加します。</div>

  <footer class="foot">
    <div class="foot-contact">Fusion Partners　｜　fusion.partners.office@gmail.com</div>
  </footer>
</div>
</body>
</html>
