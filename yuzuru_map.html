    const p = f.properties;
    const pm = pv==='ALL'||p.pref===pv;
    const rm = rv==='ALL'||(rv==='AB'&&(p.rank==='A'||p.rank==='B'))||p.rank===rv;
    const tm = tv==='ALL'||p.type.includes(tv);
    const sm = sv==='ALL'||p.status===sv;
    return pm && rm && tm && sm;
  }).sort((a,b) => b.properties.score - a.properties.score);
}

function getVisibleReferrals() {
  const masterOn = document.getElementById('refMasterToggle').checked;
  if (!masterOn) return [];
  const pv = document.getElementById('prefFilter').value;
  return REFERRAL_DATA.filter(r => {
    if (!refCategoryState[r.category]) return false;
    if (pv!=='ALL' && r.pref!==pv) return false;
    return true;
  });
}

function makeRefIcon(r) {
  const cat = REFERRAL_CATEGORIES[r.category];
  const size = cat.priority ? 16 : 12;
  return L.divIcon({
    className:'',
    html:`<div class="dot diamond" style="width:${size}px;height:${size}px;background:${cat.color};border:${cat.priority?'2.5px solid #fff':'1.5px solid rgba(255,255,255,.6)'};box-shadow:0 2px 6px rgba(0,0,0,.6);"></div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2],
  });
}

function makeRefPopupHTML(r) {
  const cat = REFERRAL_CATEGORIES[r.category];
  return `<div class="popup-wrap">
    <div class="popup-title">${cat.priority?'★ ':''}${r.name}</div>
    <div style="font-size:11px;color:#666;margin-bottom:8px">📍紹介元 ／ ${r.category}${cat.priority?'（最優先カテゴリ）':''}</div>
    <table class="popup-table">
      <tr><td>分野</td><td>${cat.field}</td></tr>
      <tr><td>住所</td><td>${r.addr}</td></tr>
      <tr><td>電話</td><td><a href="tel:${r.phone}" style="color:#1565c0">${r.phone}</a></td></tr>
    </table>
    <div style="margin-top:8px;font-size:10px;color:#999">※デモデータ（WAM NET等の実データ未投入）</div>
  </div>`;
}

function renderReferrals() {
  refLayerGroup.clearLayers();
  const visible = getVisibleReferrals();
  document.getElementById('ref-count').textContent = visible.length;
  visible.forEach(r => {
    L.marker([r.lat, r.lon], {icon: makeRefIcon(r)})
      .bindPopup(makeRefPopupHTML(r), {maxWidth:260,className:''})
      .addTo(refLayerGroup);
  });
}

function renderRefCategoryToggles() {
  const box = document.getElementById('ref-category-toggles');
  box.innerHTML = Object.entries(REFERRAL_CATEGORIES).map(([name,cat]) => `
    <label class="ref-chip${cat.priority?' priority':''}">
      <input type="checkbox" data-cat="${name}" ${refCategoryState[name]?'checked':''}>
      <span class="dot diamond" style="background:${cat.color}"></span>${cat.priority?'★':''}${name}
    </label>`).join('');
  box.querySelectorAll('input[data-cat]').forEach(cb => {
    cb.addEventListener('change', () => {
      refCategoryState[cb.dataset.cat] = cb.checked;
      renderReferrals();
    });
  });
}

function makeIcon(p, active=false) {
  return L.divIcon({
    className:'',
    html:`<div style="width:${active?24:18}px;height:${active?24:18}px;border-radius:50%;background:${p.color};border:${active?'3px solid #fff':'2px solid rgba(255,255,255,.7)'};box-shadow:0 2px 8px rgba(0,0,0,.6);transition:all .15s;"></div>`,
    iconSize:[active?24:18,active?24:18],iconAnchor:[active?12:9,active?12:9],
  });
}

function makePopupHTML(p, id) {
  const rankLabel = {A:'🔴 Aランク',B:'🟡 Bランク',C:'🔵 Cランク'};
  const statusOpts = STATUS_LIST.map(s =>
    `<option value="${s}" ${p.status===s?'selected':''}>${s}</option>`).join('');
  return `<div class="popup-wrap">
    <div class="popup-title">${p.name}</div>
    <div style="font-size:11px;color:#666;margin-bottom:8px">${rankLabel[p.rank]||p.rank} ／ ${p.score}点</div>
    <table class="popup-table">
      <tr><td>法人</td><td><b>${p.corp}</b></td></tr>
      <tr><td>種別</td><td>${p.type}</td></tr>
      <tr><td>住所</td><td>${p.addr}</td></tr>
      <tr><td>電話</td><td><a href="tel:${p.phone}" style="color:#1565c0">${p.phone}</a></td></tr>
      <tr><td>定員</td><td>${p.capacity}名 ／ 待機${p.waitlist}名</td></tr>
      <tr><td>加算</td><td style="color:${p.kaizen==='未取得'?'#c62828':'#2e7d32'};font-weight:bold">${p.kaizen}</td></tr>
      <tr><td>理由</td><td style="color:#555;font-size:11px">${p.reason}</td></tr>
    </table>
    <div style="margin-top:8px;font-size:11px;color:#666">アプローチ状況：</div>
    <select class="status-select" onchange="updateStatus(${id},this.value)">${statusOpts}</select>
  </div>`;
}

function updateStatus(id, status) {
  data[id].properties.status = status;
  saveStatus(id, status);
  render();
  // ポップアップを開き直す
  if (markerMap[id]) {
    markerMap[id].setPopupContent(makePopupHTML(data[id].properties, id));
  }
}

function render() {
  layerGroup.clearLayers();
  markerMap = {};
  const visible = getVisible();
  document.getElementById('total-count').textContent = visible.length;
  document.getElementById('a-count').textContent = visible.filter(f=>f.properties.rank==='A').length;
  document.getElementById('b-count').textContent = visible.filter(f=>f.properties.rank==='B').length;
  document.getElementById('c-count').textContent = visible.filter(f=>f.properties.rank==='C').length;
  visible.forEach(f => {
    const p = f.properties;
    const id = f.id;
    const marker = L.marker(f.geometry.coordinates.slice().reverse(), {icon: makeIcon(p, id===activeId)})
      .bindPopup(makePopupHTML(p, id), {maxWidth:290,className:''})
      .on('click', () => { activeId=id; render(); })
      .on('popupclose', () => { if(activeId===id){activeId=null; render();} });
    marker.addTo(layerGroup);
    markerMap[id] = marker;
  });
  renderSidebar(visible);
}

function renderSidebar(visible) {
  const list = document.getElementById('facility-list');
  document.getElementById('sidebar-count').textContent = visible.length + '件';
  list.innerHTML = '';
  visible.forEach(f => {
    const p = f.properties;
    const id = f.id;
    const sc = STATUS_COLORS[p.status] || '#546e7a';
    const card = document.createElement('div');
    card.className = 'fac-card' + (id===activeId?' active':'');
    card.innerHTML = `
      <div><span class="fac-rank" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.rank}ランク</span>
           <span class="fac-status-badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${p.status}</span></div>
      <div class="fac-name">${p.name}</div>
      <div class="fac-meta">${p.corp} ／ ${p.type}</div>
      <div class="fac-score">スコア ${p.score}点 ／ <span style="font-size:11px;font-weight:normal;color:#8b949e">${p.phone}</span></div>
    `;
    card.onclick = () => {
      activeId = id;
      render();
      if(markerMap[id]) { markerMap[id].openPopup(); map.panTo(f.geometry.coordinates.slice().reverse()); }
    };
    list.appendChild(card);
  });
}

// CSV出力
document.getElementById('csv-btn').onclick = () => {
  const visible = getVisible();
  const cols = ['施設名','法人名','種別','住所','電話番号','定員','待機者数','処遇改善加算','スコア','ランク','スコア理由','アプローチ状況'];
  const rows = visible.map(f => {
    const p = f.properties;
    return [p.name,p.corp,p.type,p.addr,p.phone,p.capacity,p.waitlist,p.kaizen,p.score,p.rank,p.reason,p.status]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '﻿' + cols.join(',') + '\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = '弦システム_営業先リスト_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.csv';
  a.click();
};

['prefFilter','rankFilter','typeFilter','statusFilter'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => { activeId=null; render(); renderReferrals(); })
);
document.getElementById('refMasterToggle').addEventListener('change', renderReferrals);

// 紹介元CSV出力
function exportReferralCSV() {
  const visible = getVisibleReferrals();
  const cols = ['名称','分野','カテゴリ','最優先','都道府県','住所','電話番号'];
  const rows = visible.map(r => {
    const cat = REFERRAL_CATEGORIES[r.category];
    return [r.name,cat.field,r.category,cat.priority?'★':'',r.pref,r.addr,r.phone]
      .map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '﻿' + cols.join(',') + '\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = '弦システム_紹介元リスト_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.csv';
  a.click();
}
document.getElementById('ref-csv-btn').onclick = exportReferralCSV;

legend.addTo(map);

renderRefCategoryToggles();
render();
renderReferrals();
</script>
