<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>奏 Kanade v1 — Fusion Partners</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232d7a52'/><text x='16' y='24' font-size='20' text-anchor='middle'>🎵</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f1ea;
    --bg2: #ede8df;
    --border: #c8b89a;
    --text: #3a3028;
    --text2: #6a5a4a;
    --text3: #9a8a7a;
    --accent: #8a7a6a;
    --green: #2d7a52;
    --red: #c0392b;
    --gold: #b8860b;
    --card: #faf7f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .header {
    background: var(--text);
    color: var(--bg);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 6px;
  }
  .header span { font-size: 11px; color: var(--border); letter-spacing: 2px; }
  .header .who { margin-left: auto; font-size: 11px; color: var(--border); letter-spacing: 1px; }

  .mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .mode-tab {
    flex: 1; padding: 13px; text-align: center; font-size: 13px;
    cursor: pointer; border: none; background: none; color: var(--text3);
    letter-spacing: 1px; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); font-weight: 500; }

  .screen { display: none; padding: 18px 16px; max-width: 760px; margin: 0 auto; }
  .screen.active { display: block; }

  .section {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .section-title {
    font-size: 11px; color: var(--text3); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 0.5px solid var(--border);
  }
  .floor-tag {
    display: inline-block; font-family: 'Noto Serif JP', serif; font-size: 12px;
    color: var(--accent); border: 0.5px solid var(--border); border-radius: 4px;
    padding: 1px 8px; margin-right: 8px; letter-spacing: 1px;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.5px; }

  input[type=text], input[type=date], textarea, select {
    width: 100%; padding: 9px 11px; font-family: inherit; font-size: 14px;
    color: var(--text); background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 6px; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; line-height: 1.6; }
  .ego-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .ego-grid label { text-align: center; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .q-list { list-style: none; margin: 4px 0 10px; padding-left: 0; }
  .q-list li {
    font-size: 13px; color: var(--text2); padding: 4px 0 4px 16px;
    position: relative; line-height: 1.6;
  }
  .q-list li::before { content: '—'; position: absolute; left: 0; color: var(--accent); }
  .observe {
    font-size: 12px; color: var(--text3); background: var(--bg2);
    border-left: 2px solid var(--border); padding: 7px 10px; border-radius: 0 4px 4px 0;
    margin-top: 6px;
  }

  .score-row { display: flex; align-items: center; gap: 12px; margin: 10px 0 4px; }
  .score-row .name { font-size: 13px; color: var(--text); min-width: 84px; font-weight: 500; }
  .score-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .score-row .val {
    font-family: 'Noto Serif JP', serif; font-size: 16px; color: var(--accent);
    min-width: 48px; text-align: right;
  }

  .rjp-choices { display: flex; gap: 8px; flex-wrap: wrap; }
  .rjp-choices button {
    flex: 1; min-width: 120px; padding: 10px; font-family: inherit; font-size: 13px;
    border: 0.5px solid var(--border); background: var(--bg); color: var(--text2);
    border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .rjp-choices button.sel { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .btn {
    display: inline-block; padding: 11px 20px; font-family: inherit; font-size: 14px;
    border: none; border-radius: 6px; cursor: pointer; letter-spacing: 1px; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-ghost { background: var(--bg); color: var(--text2); border: 0.5px solid var(--border); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

  .total-card {
    background: var(--text); color: var(--bg); border-radius: 10px;
    padding: 22px; text-align: center; margin-bottom: 16px;
  }
  .total-card .big { font-family: 'Noto Serif JP', serif; font-size: 48px; line-height: 1; }
  .total-card .big span { font-size: 22px; color: var(--border); }
  .total-card .label { font-size: 11px; letter-spacing: 3px; color: var(--border); margin-top: 6px; }
  .bars { margin-top: 16px; text-align: left; }
  .bar-row { margin-bottom: 9px; }
  .bar-row .bl { display: flex; justify-content: space-between; font-size: 11px; color: var(--border); margin-bottom: 3px; }
  .bar-track { height: 6px; background: rgba(200,184,154,0.25); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--border); border-radius: 3px; transition: width 0.3s; }

  .cand-item {
    display: flex; align-items: center; gap: 12px; padding: 13px 14px;
    background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 9px; cursor: pointer;
  }
  .cand-item:hover { border-color: var(--accent); }
  .cand-item.current { border-color: var(--accent); background: var(--bg2); }
  .cand-item .nm { font-weight: 500; }
  .cand-item .meta { font-size: 11px; color: var(--text3); }
  .cand-item .sc { margin-left: auto; font-family: 'Noto Serif JP', serif; color: var(--accent); font-size: 16px; }
  .cand-item .del { color: var(--text3); font-size: 16px; padding: 0 6px; }

  .note-box { font-size: 11px; color: var(--text3); line-height: 1.7; }
  .empty { text-align: center; color: var(--text3); padding: 40px 0; font-size: 13px; }
  .current-banner {
    background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 14px; font-size: 13px;
  }
  .current-banner b { font-family: 'Noto Serif JP', serif; letter-spacing: 1px; }
  .pill { font-size: 10px; letter-spacing: 1px; color: var(--gold); border: 0.5px solid var(--gold); border-radius: 10px; padding: 1px 8px; margin-left: 8px; }
  pre.md {
    white-space: pre-wrap; font-family: 'Noto Sans JP', monospace; font-size: 12px;
    background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px;
    padding: 14px; line-height: 1.7; color: var(--text2); max-height: 360px; overflow-y: auto;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg); padding: 11px 22px; border-radius: 24px;
    font-size: 13px; opacity: 0; transition: opacity 0.25s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── 適性検査フェーズ2：LSRP（法務準拠UI） ── */
  .legal-note {
    font-size: 11px; color: var(--text2); line-height: 1.7;
    background: #fbf4e8; border: 0.5px solid var(--gold); border-radius: 6px;
    padding: 10px 12px; margin-bottom: 12px;
  }
  .legal-note b { color: var(--gold); }
  .consent-row {
    display: flex; align-items: flex-start; gap: 9px;
    background: var(--bg2); border: 0.5px solid var(--border); border-radius: 6px;
    padding: 11px 12px; margin-bottom: 10px; cursor: pointer;
  }
  .consent-row input[type=checkbox] { width: 18px; height: 18px; margin-top: 1px; accent-color: var(--green); flex-shrink: 0; cursor: pointer; }
  .consent-row .c-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .consent-row .c-text b { color: var(--text); }
  .consent-ok { display: block; color: var(--green); font-size: 11px; margin-top: 4px; }
  .lsrp-locked { opacity: 0.4; pointer-events: none; }
  .lsrp-sub-title { font-family: 'Noto Serif JP', serif; font-size: 13px; color: var(--text); margin: 4px 0 8px; letter-spacing: 1px; }
  .trigger-banner {
    font-size: 12px; color: var(--text2); line-height: 1.7;
    background: #fff3cd; border: 1px solid var(--gold); border-radius: 6px;
    padding: 10px 12px; margin: 10px 0;
  }
  .trigger-banner .t-title { display: block; font-weight: 600; color: var(--gold); margin-bottom: 4px; }
  .trigger-banner b { color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <h1>奏</h1>
  <span>KANADE v1 · 採用アセスメント</span>
  <span class="who">Fusion Partners</span>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" data-screen="list">候補者</button>
  <button class="mode-tab" data-screen="interview">面接</button>
  <button class="mode-tab" data-screen="profile">プロファイル</button>
</div>

<!-- ============ 候補者リスト ============ -->
<div class="screen active" id="screen-list">
  <div class="section">
    <div class="section-title">新規候補者</div>
    <div class="two-col">
      <div class="field"><label>候補者名</label><input type="text" id="new-name" placeholder="氏名"></div>
      <div class="field"><label>ポジション</label><input type="text" id="new-pos" placeholder="募集職種"></div>
    </div>
    <div class="two-col">
      <div class="field"><label>面接日</label><input type="date" id="new-date"></div>
      <div class="field"><label>面接官</label><input type="text" id="new-interviewer" placeholder="例：柴山靖章"></div>
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="addCandidate()">＋ 候補者を追加して面接へ</button></div>
  </div>

  <div class="section">
    <div class="section-title">候補者一覧</div>
    <div id="cand-list"></div>
  </div>
</div>

<!-- ============ 面接 ============ -->
<div class="screen" id="screen-interview">
  <div id="iv-body">
    <div class="empty">「候補者」タブで候補者を追加・選択してください。</div>
  </div>
</div>

<!-- ============ プロファイル ============ -->
<div class="screen" id="screen-profile">
  <div id="pf-body">
    <div class="empty">候補者を選択すると、スコア集計とプロファイルが表示されます。</div>
  </div>
</div>

<!-- 適性検査インポートモーダル -->
<div id="aptitude-import-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--card);border-radius:12px;max-width:560px;width:100%;padding:24px;">
    <div style="font-family:'Noto Serif JP',serif;font-size:16px;margin-bottom:12px;">📥 適性検査をインポート</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:10px;">①「📝 適性検査を受ける」ボタンで別タブを開き検査を受ける②検査結果画面の「📋 ミツメルにコピー」ボタンを押す③ここに戻って下に貼り付ける④「フィールドに反映する」を押す。</p>
    <textarea id="aptitude-import-json" rows="10" style="width:100%;font-size:11px;font-family:monospace;padding:10px;border:0.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);resize:vertical;" placeholder='{"egogram":{...},"enneagram":{...},"lsrp":{...}}'></textarea>
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn btn-primary" onclick="importAptitudeResult()" style="flex:1;">フィールドに反映する</button>
      <button class="btn btn-secondary" onclick="closeAptitudeImport()" style="flex:1;">キャンセル</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 奏 Kanade v1 — MVP（範囲A：面接ガイド＋自動採点）
// データは localStorage に保存（縦断データの種）。
// 適性検査フェーズ2：LSRP搭載（2026-07-21・柴山さん判断により検証段階のためダミー参照文書を使用。
// 08_法務\検証用ダミー_奏LSRP運用文書_20260721.md 参照。実在の法務意見書ではない）。
//   原則：①医学的診断でない ②スコアのみで採否不可 ③本人同意必須 ④トリガーであり命令でない。
// ============================================================

const STORE_KEY = 'kanade_candidates_v1';
let candidates = [];
let currentId = null;

// 面接ガイド定義（設計書 奏システム_設計書_20260621.md より忠実に転記）
const GUIDE = {
  skill: {
    floor: '地上1F', title: 'スキル・経験マッチ', max: 10, key: 's_skill',
    desc: '「できると言っているが、本当にやったのか」を事実で確認する。',
    q: ['直近の職場で、最も成果が出た仕事を一つ教えてください',
        'その仕事で、あなたが具体的にやったことを時系列で教えてください',
        'その結果、数字でどう変わりましたか？'],
    obs: '主語が「私」か（「チームで」に逃げていないか）／数字・固有名詞・時期が出るか／詰めると詰まらないか'
  },
  comp: {
    floor: '地下1F', title: 'コンピテンシー', sub: true,
    items: [
      { name: '成果志向', max: 5, key: 's_seika',
        q: ['過去最も達成が難しかった目標は何ですか？なぜそれを選んだのですか？',
            '途中で諦めそうになった瞬間はありましたか？その時どうしましたか？',
            '最終的な結果は、当初の目標と比べてどうでしたか？'] },
      { name: '戦略志向', max: 5, key: 's_senryaku',
        q: ['いくつかの選択肢があって、あなたが判断しなければならなかった場面を教えてください',
            'その時、何を根拠に判断しましたか？他の選択肢を捨てた理由は？',
            'その判断を振り返って、今なら何を変えますか？'] },
      { name: '変革志向', max: 5, key: 's_henkaku',
        q: ['今までのやり方に疑問を感じて、変えようとしたことはありますか？',
            '反対する人はいましたか？どう動きましたか？',
            '変えた結果どうなりましたか？もし失敗した場合、何を学びましたか？'] }
    ],
    noteKey: 'note_comp'
  },
  pote: {
    floor: '地下2F', title: 'ポテンシャル（最重要）', sub: true,
    items: [
      { name: '好奇心', max: 5, key: 's_kouki',
        q: ['最近、仕事と関係なく夢中になって調べたことはありますか？',
            'それはどこまで調べましたか？どこで止まりましたか？止まった理由は？',
            'その知識を誰かに話したことはありますか？相手の反応は？'],
        obs: '話すスピードが上がる・目が輝く領域があるか。「特にないです」は危険サイン。' },
      { name: '洞察力', max: 5, key: 's_dosatsu',
        q: ['一見関係なさそうな2つのことが、実は同じ構造だと気づいたことはありますか？',
            '職場・業界の問題で「みんな当たり前だと思っているが実はおかしい」と感じたことは？',
            'その気づきを誰かに伝えた時、相手はどう反応しましたか？'],
        obs: '具体例が出るか。「抽象的に語れる→例が出ない」は洞察力でなく丸暗記。' },
      { name: '胆力', max: 5, key: 's_tanryoku',
        q: ['自分が正しいと思ったことに対して、上司や周囲から反対されたことはありますか？',
            'その時どうしましたか？諦めましたか、それとも押し切りましたか？',
            'その判断を今振り返って、どう思いますか？'],
        obs: '「波風立てずに従った」を美徳として語っていないか。胆力の欠如は謙虚に見える。' },
      { name: '共鳴力', max: 5, key: 's_kyomei',
        q: ['誰かの気持ちが、言葉にされる前に手に取るようにわかった経験はありますか？',
            'あなたが関わったことで、誰かの行動や気持ちが大きく変わった場面を教えてください',
            'その人はその後どうなりましたか？'],
        obs: '「想像した」でなく「相手がそう言っていた」まで追えるか。⚠️能力・実績の話に比べて、この項目だけ極端に薄い／他責に流れる場合は、共鳴力の"欠落"のサインかもしれない（事実で確認：具体的に誰が・いつ・何と言ったか）。毒サインは事実に基づく観察であり、印象や第一印象で判断しないこと。' }
    ],
    noteKey: 'note_pote'
  },
  values: {
    floor: '地下3F', title: '価値観・人生観適合', max: 10, key: 's_values',
    desc: 'ここがズレるとスキルがあっても長続きしない。',
    q: ['10年後、どんな状態にいたいですか？仕事でも、人生でも',
        '働く上で、絶対に譲れないことは何ですか？',
        'あなたが心の底から尊敬している人は誰ですか？その人のどこを尊敬していますか？',
        '今まで最も後悔した選択と、最も誇りに思う選択を一つずつ教えてください'],
    obs: '答えの内容より「即座に出るか・自分の言葉か」を見る。準備した良い答えは音程が合いすぎて不自然。⚠️「チームの成功」より「自分が正しかったこと」を繰り返し語る場合は、価値観の自己中心傾向のサインかもしれない。毒サインは事実に基づく観察であり、印象や第一印象で判断しないこと。',
    noteKey: 'note_values'
  }
};

const SCORE_KEYS = ['s_skill','s_seika','s_senryaku','s_henkaku','s_kouki','s_dosatsu','s_tanryoku','s_kyomei','s_values'];

// ---------- 永続化 ----------
function load() { try { candidates = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e){ candidates = []; } }
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(candidates)); }
function cur() { return candidates.find(c => c.id === currentId); }
function totalOf(c) { return SCORE_KEYS.reduce((s,k)=> s + (Number(c[k])||0), 0); }
function fmtDate(d){ return d || '—'; }

function newId() {
  // Date.now 代替（環境制約なし・衝突回避用の単純増分）
  let max = 0; candidates.forEach(c => { if (c.id > max) max = c.id; });
  return max + 1;
}

// ---------- Block1：面接仮説生成（AI）・LSRPアラート ----------
// AI機能は共有Worker（hibiki_worker.js／柴山さんのAPIキーをサーバー側で保持）経由。
// 面接官個人がAPIキーを用意する必要はない。
const KANADE_WORKER_URL = 'https://hibiki-worker.fusion-partners-office.workers.dev/kanade-analyze';

// 実装安全原則v1・原則1準拠（2026-07-20）：公開URLを知っていれば誰でも叩けるコスト空撃ちリスクを
// 塞ぐためのトークン。個人データは扱わないため漏洩リスクは無いが、原則に沿って認証を付ける。
function getKanadeToken() { return localStorage.getItem('kanade_access_token') || ''; }
function saveKanadeToken() {
  const input = document.getElementById('kanade-token-input');
  const token = (input || {value:''}).value.trim();
  if (!token) return;
  localStorage.setItem('kanade_access_token', token);
  renderInterview();
}

function callClaude(promptText, onSuccess, onError) {
  fetch(KANADE_WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ promptText, token: getKanadeToken() })
  }).then(r => r.json()).then(data => {
    if (data.error) { onError(data.error); return; }
    const text = data.content?.map(x => x.text || '').join('') || 'エラーが発生しました';
    onSuccess(text);
  }).catch(e => onError(e.message));
}

// LSRPアラート閾値は組織内の任意設定値（臨床的な検証済みカットオフ値ではない）。
// 未設定の間はアラート自体を表示しない。
function getLsrpThreshold(){ return localStorage.getItem('kanade_lsrp_threshold') || ''; }
function setLsrpThreshold(v){ localStorage.setItem('kanade_lsrp_threshold', v.trim()); renderInterview(); }
function lsrpTotal(c){
  if (c.lsrp1==='' || c.lsrp2==='' || c.lsrp1==null || c.lsrp2==null) return null;
  const a = Number(c.lsrp1), b = Number(c.lsrp2);
  if (isNaN(a) || isNaN(b)) return null;
  return a + b;
}
// 文言・表示ロジックは 06_イノベーション/奏Block1_LSRP高スコアアラート_文言使い分け設計_20260703.md §3-1準拠
// （採用面接時＝原文「面接中止推奨」＋参考情報の付帯表示必須。自動除外・自動ステータス変更は行わない）
function lsrpAlertBanner(c){
  const th = getLsrpThreshold();
  if (!th || !c.lsrpConsent) return '';
  const total = lsrpTotal(c);
  if (total===null || total <= Number(th)) return '';
  return `<div class="legal-note" style="margin-top:10px">
    <b>⚠ 面接中止推奨</b>（LSRP合計 ${total}pt／設定閾値 ${esc(th)}pt 超過）<br>
    <span style="font-size:11px">※これは参考情報です。最終判断は面接官が行ってください。システムによる応募者の自動除外・ステータス変更は行いません（検証用ダミー文書 条件2〔仮〕・実在の正式な法務確認ではありません）。</span>
  </div>`;
}

function generateHypothesis() {
  const c = cur(); if (!c) return;
  const loading = document.getElementById('hyp-loading');
  if (loading) loading.style.display = 'block';
  const ego = ['CP','NP','A','FC','AC'].map(k=>`${k}:${c['ego'+k]||'—'}`).join(' ');
  const promptText = `あなたは採用面接の設計を支援する専門家です。以下の適性検査結果から、面接で重点的に確認すべき問いを3〜5点、日本語で簡潔に生成してください。
各問いは1行・質問文のみ（番号付き箇条書き）。前置きや解説文は書かないこと。ハルシネーション禁止、検査結果にない事実を創作しないこと。
候補者のスキル・成果志向（フェーズ2進行後は地上1F・地下1Fのスコア）が高い一方、共鳴力や価値観の観察ポイントで気になる兆候がある場合は、そのねじれを面接官に一言で示唆してください（断定はせず、確認質問の形で）。

候補者：${c.name}（応募ポジション：${c.position||'未設定'}）
エゴグラム（5つの自我状態）：${ego}
エニアグラム：${c.ennea||'未入力'} ${c.enneaWing||''}
検査から立てた仮説メモ（面接官記入）：${c.p1note||'なし'}
${c.lsrpConsent ? `LSRP参考スコア：一次${c.lsrp1||'—'}pt／二次${c.lsrp2||'—'}pt（面接で事実確認すべき参考情報。医学的診断ではない）` : 'LSRP：本人同意未取得のため未実施'}`;

  callClaude(promptText,
    text => {
      if (loading) loading.style.display = 'none';
      c.aiHypothesis = text.trim();
      c.aiHypothesisAt = new Date().toISOString().slice(0,16).replace('T',' ');
      save(); renderInterview();
    },
    err => {
      if (loading) loading.style.display = 'none';
      toast('生成エラー：' + err);
    }
  );

// ---------- 往復ループ：フロアごとのAI事実確認（意見/事実判定） ----------
function checkFactVsOpinion(floorKey) {
  const c = cur(); if (!c) return;
  const noteMap = { skill: 'note_skill', comp: 'note_comp', pote: 'note_pote', values: 'note_values' };
  const noteKey = noteMap[floorKey];
  const note = c[noteKey] || '';
  if (!note.trim()) { toast('先に根拠コメントを入力してください'); return; }

  const promptText = `あなたは採用面接の質を上げる専門家です。以下は面接官が書いた候補者評価の根拠メモです。
このメモが「意見・印象」に寄っているか「事実（誰が・いつ・具体的に何をしたか・数字）」に基づいているかを判定し、
意見に寄っている場合は、事実を引き出すための追加質問を1つ、日本語で簡潔に提案してください。
既に事実ベースで十分に具体的な場合は「事実ベースで十分具体的です」とだけ返してください。
ハルシネーション禁止。メモに無い事実を創作しないこと。

メモ：${note}`;

  callClaude(promptText,
    text => { c[`aiFactCheck_${floorKey}`] = text.trim();
              c[`aiFactCheck_${floorKey}At`] = new Date().toISOString().slice(0,16).replace('T',' ');
              save(); renderInterview(); },
    err => toast('生成エラー：' + err)
  );
}

function factCheckBlock(floorKey, c) {
  const result = c[`aiFactCheck_${floorKey}`];
  return `
    <button class="btn btn-secondary" onclick="checkFactVsOpinion('${floorKey}')">🔍 事実を確認する</button>
    ${result ? `<div class="note-box" style="margin-top:8px;white-space:pre-wrap">🔍 AIの見立て（${c[`aiFactCheck_${floorKey}At`]}）\n${esc(result)}</div>` : ''}
  `;
}

// ---------- 適性検査インポート（mitsumeru_tekisei_check.htmlの出力を取り込む） ----------
function openAptitudeImport() {
  document.getElementById('aptitude-import-overlay').style.display = 'flex';
}
function closeAptitudeImport() {
  document.getElementById('aptitude-import-overlay').style.display = 'none';
  document.getElementById('aptitude-import-json').value = '';
}
function importAptitudeResult() {
  const c = cur(); if (!c) { alert('先に候補者を選択してください。'); return; }
  const raw = document.getElementById('aptitude-import-json').value.trim();
  let data;
  try { data = JSON.parse(raw); } catch(e) { alert('貼り付けた内容が読み取れませんでした。適性検査の「📋 ミツメルにコピー」ボタンで取得した内容をそのまま貼り付けてください。'); return; }

  let imported = [];
  // エゴグラム：data.egogram.CP/NP/A/FC/AC
  if (data.egogram) {
    let egoImported = false;
    ['CP','NP','A','FC','AC'].forEach(k => {
      if (data.egogram[k] !== undefined) { c['ego'+k] = data.egogram[k]; egoImported = true; }
    });
    if (egoImported) imported.push('エゴグラム');
  }
  // エニアグラム：data.enneagram.top3[0]（第1位のみ反映。ウィングは手入力のまま）
  if (data.enneagram && data.enneagram.top3 && data.enneagram.top3[0]) {
    const top1 = data.enneagram.top3[0];
    const num = (top1.type || '').replace(/^T/, '');
    if (num) { c.ennea = 'タイプ' + num + (top1.name ? '（' + top1.name + '）' : ''); imported.push('エニアグラム'); }
  }
  // LSRP：本人同意（lsrpConsent）取得済みの場合のみ反映（検証用ダミー文書・08_法務\検証用ダミー_奏LSRP運用文書_20260721.md の同意ゲートを迂回しない）
  if (data.lsrp && (data.lsrp.primary !== undefined || data.lsrp.secondary !== undefined)) {
    if (!c.lsrpConsent) {
      alert('LSRPスコアも含まれていますが、本人同意が未取得のためLSRP欄への反映はスキップしました。\nエゴグラム・エニアグラムのみ反映します。同意取得後、再度インポートしてください。');
    } else {
      if (data.lsrp.primary !== undefined) c.lsrp1 = data.lsrp.primary;
      if (data.lsrp.secondary !== undefined) c.lsrp2 = data.lsrp.secondary;
      imported.push('LSRP');
    }
  }

  if (!imported.length) { alert('反映できる項目が見つかりませんでした。'); return; }
  save();
  renderInterview();
  alert('適性検査の結果（' + imported.join('・') + '）をフィールドに反映しました。内容を確認してください。');
  closeAptitudeImport();
}

    ${qBlock({q:g.skill.q, obs:g.skill.obs})}
    ${scoreRow('スキル・経験', g.skill.key, g.skill.max, c[g.skill.key])}
    <div class="field" style="margin-top:10px"><label>根拠コメント（スキル・経験）</label><textarea oninput="setField('note_skill', this.value)">${esc(c.note_skill)}</textarea></div>
    ${factCheckBlock('skill', c)}
  </div>

  <!-- フェーズ2：地下1F -->
  <div class="section">
    <div class="section-title"><span class="floor-tag">${g.comp.floor}</span>${g.comp.title}（各5点 / 15点）</div>
    ${g.comp.items.map(it=>`
      <div style="margin-bottom:14px">
        <div style="font-weight:500;font-size:13px;margin-bottom:2px">${esc(it.name)}</div>
        ${qBlock(it)}
        ${scoreRow(it.name, it.key, it.max, c[it.key])}
      </div>`).join('')}
    <div class="field"><label>根拠コメント（コンピテンシー）</label><textarea oninput="setField('note_comp', this.value)">${esc(c.note_comp)}</textarea></div>
    ${factCheckBlock('comp', c)}
  </div>

  <!-- フェーズ2：地下2F -->
  <div class="section">
    <div class="section-title"><span class="floor-tag">${g.pote.floor}</span>${g.pote.title}（各5点 / 20点）</div>
    ${g.pote.items.map(it=>`
      <div style="margin-bottom:14px">
        <div style="font-weight:500;font-size:13px;margin-bottom:2px">${esc(it.name)}</div>
        ${qBlock(it)}
        ${scoreRow(it.name, it.key, it.max, c[it.key])}
      </div>`).join('')}
    <div class="field"><label>根拠コメント（ポテンシャル）</label><textarea oninput="setField('note_pote', this.value)">${esc(c.note_pote)}</textarea></div>
    <div class="note-box" style="margin-top:6px">※上記の観察ポイントは面接官の気づきを助けるための参考です。単独で合否を決定するものではなく、他の評価と合わせて総合的に判断してください。</div>
    ${factCheckBlock('pote', c)}
  </div>

  <!-- フェーズ2：地下3F -->
  <div class="section">
    <div class="section-title"><span class="floor-tag">${g.values.floor}</span>${g.values.title}（${g.values.max}点）</div>
    <div class="note-box" style="margin-bottom:8px">${esc(g.values.desc)}</div>
    ${qBlock({q:g.values.q, obs:g.values.obs})}
    ${scoreRow('価値観適合', g.values.key, g.values.max, c[g.values.key])}
    <div class="field" style="margin-top:10px"><label>根拠コメント（価値観）</label><textarea oninput="setField('note_values', this.value)">${esc(c.note_values)}</textarea></div>
    <div class="note-box" style="margin-top:6px">※上記の観察ポイントは面接官の気づきを助けるための参考です。単独で合否を決定するものではなく、他の評価と合わせて総合的に判断してください。</div>
    ${factCheckBlock('values', c)}
  </div>

  <!-- フェーズ3：RJP -->
  <div class="section">
    <div class="section-title">フェーズ3 ｜ RJP（ぶっちゃけ採用）反応</div>
    <div class="note-box" style="margin-bottom:10px">困難・現実を開示した後の反応を見る。前のめり＝本物の志望度・胆力。</div>
    <div class="rjp-choices">
      ${[['◎','◎ 前のめり'],['○','○ 受け止めた'],['△','△ 引いた'],['×','× 回避']].map(([v,l])=>
        `<button class="${c.rjp===v?'sel':''}" onclick="setRjp('${v}')">${l}</button>`).join('')}
    </div>
    <div class="field" style="margin-top:12px"><label>RJP後の「それでも来たい理由」</label><textarea oninput="setField('rjp_reason', this.value)">${esc(c.rjp_reason)}</textarea></div>
  </div>

  <!-- 整合性・直感 -->
  <div class="section">
    <div class="section-title">検査 × 面接 整合性確認</div>
    <div class="two-col">
      <div class="field"><label>エニアグラムの動機 ↔ 面接の行動は一致したか</label>
        <select onchange="setField('consistency_ennea', this.value)">
          ${optList(['','一致','乖離あり'], c.consistency_ennea)}
        </select></div>
      <div class="field"><label>エゴグラムの傾向は言動に現れたか</label>
        <select onchange="setField('consistency_ego', this.value)">
          ${optList(['','現れた','現れず'], c.consistency_ego)}
        </select></div>
    </div>
    <div class="field"><label>面接官の直感メモ（スコアに表れなかった気になる点）</label><textarea oninput="setField('hunch', this.value)">${esc(c.hunch)}</textarea></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="switchScreen('profile')">プロファイルを見る →</button>
  </div>`;
}

function optList(opts, sel) { return opts.map(o=>`<option value="${o}" ${o===sel?'selected':''}>${o||'—'}</option>`).join(''); }

// ---------- レンダリング：プロファイル ----------
function judgeLabel(total) {
  if (total >= 40) return ['採用推薦圏', 'var(--green)'];
  if (total >= 28) return ['2次面談検討圏', 'var(--gold)'];
  return ['要再確認圏', 'var(--red)'];
}

function renderProfile() {
  const body = document.getElementById('pf-body');
  const c = cur();
  if (!c) { body.innerHTML = '<div class="empty">候補者を選択すると、スコア集計とプロファイルが表示されます。</div>'; return; }
  const total = totalOf(c);
  const [jl, jcolor] = judgeLabel(total);

  const groups = [
    ['地上1F スキル', c.s_skill, 10],
    ['地下1F コンピテンシー', c.s_seika+c.s_senryaku+c.s_henkaku, 15],
    ['地下2F ポテンシャル', c.s_kouki+c.s_dosatsu+c.s_tanryoku+c.s_kyomei, 20],
    ['地下3F 価値観', c.s_values, 10]
  ];

  body.innerHTML = `
  <div class="total-card">
    <div class="big">${total}<span> / 55</span></div>
    <div class="label">${esc(c.name)} ｜ <span style="color:${jcolor}">${jl}</span></div>
    <div class="bars">
      ${groups.map(([n,v,m])=>`
        <div class="bar-row">
          <div class="bl"><span>${n}</span><span>${v}/${m}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${m?Math.round(v/m*100):0}%"></div></div>
        </div>`).join('')}
      <div class="bar-row"><div class="bl"><span>RJP反応</span><span>${c.rjp||'—'}</span></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">最終判定（決定は柴山さん）</div>
    <div class="field">
      <select onchange="setField('judgment', this.value); renderProfile()">
        ${optList(['','採用推薦','2次面談','見送り'], c.judgment)}
      </select>
    </div>
    <div class="note-box">※ スコア圏はあくまで参考。判定は面接官が決めます（奏は提示、決定は人）。</div>
  </div>

  <div class="section">
    <div class="section-title">候補者プロファイル（Markdown）</div>
    <pre class="md" id="md-out">${esc(buildMarkdown(c))}</pre>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn btn-ghost" onclick="copyMd()">📋 コピー</button>
      <button class="btn btn-primary" onclick="downloadMd()">⬇ .md でダウンロード</button>
    </div>
    <div class="note-box" style="margin-top:8px">Obsidianの 01_今日のデスク に貼れば、そのまま報告書になります。</div>
  </div>`;
}

function buildMarkdown(c) {
  const total = totalOf(c);
  const [jl] = judgeLabel(total);
  const comp = c.s_seika+c.s_senryaku+c.s_henkaku;
  const pote = c.s_kouki+c.s_dosatsu+c.s_tanryoku+c.s_kyomei;
  return `# 奏システム 候補者プロファイル

- 候補者名：${c.name}
- ポジション：${c.position||'—'}
- 面接日：${c.date||'—'}　面接官：${c.interviewer||'—'}

## 総合スコア：${total} / 55 （${jl}）

| 階層 | 項目 | スコア |
|------|------|--------|
| 地上1F | スキル・経験 | ${c.s_skill} / 10 |
| 地下1F | コンピテンシー（成果${c.s_seika}・戦略${c.s_senryaku}・変革${c.s_henkaku}） | ${comp} / 15 |
| 地下2F | ポテンシャル（好奇${c.s_kouki}・洞察${c.s_dosatsu}・胆力${c.s_tanryoku}・共鳴${c.s_kyomei}） | ${pote} / 20 |
| 地下3F | 価値観・人生観適合 | ${c.s_values} / 10 |

## フェーズ1：適性検査
- エゴグラム：CP${c.egoCP||'—'} / NP${c.egoNP||'—'} / A${c.egoA||'—'} / FC${c.egoFC||'—'} / AC${c.egoAC||'—'}
- エニアグラム：${c.ennea||'—'} ${c.enneaWing||''}
- 所見・仮説：${c.p1note||'—'}

## 適性検査フェーズ2：LSRP（参考指標・検証段階）
- 本人同意：${c.lsrpConsent ? '取得済み（'+(c.lsrpConsentDate||'日時不明')+'）' : '未取得'}
- 一次サイコパシー：${c.lsrp1||'—'} pt ／ 二次サイコパシー：${c.lsrp2||'—'} pt
- 面談で確認した事実・所見：${c.lsrpNote||'—'}
- ※LSRPは医学的診断ではなく参考指標。スコアのみでの採否・配置決定は不可。これはトリガーであり命令ではない（検証用ダミー文書 条件2〔仮〕・正式な法務確認は未完了）。

## 面接仮説（AI生成・Block1）
${c.aiHypothesis ? c.aiHypothesis + '\n\n生成日時：' + (c.aiHypothesisAt||'—') : '未生成'}

## フェーズ2：根拠コメント
- スキル・経験：${c.note_skill||'—'}
- コンピテンシー：${c.note_comp||'—'}
- ポテンシャル：${c.note_pote||'—'}
- 価値観：${c.note_values||'—'}

## 🔍 AIの見立て（往復ループ・事実/意見判定）
- スキル・経験：${c.aiFactCheck_skill ? c.aiFactCheck_skill + '（' + (c.aiFactCheck_skillAt||'—') + '）' : '未実施'}
- コンピテンシー：${c.aiFactCheck_comp ? c.aiFactCheck_comp + '（' + (c.aiFactCheck_compAt||'—') + '）' : '未実施'}
- ポテンシャル：${c.aiFactCheck_pote ? c.aiFactCheck_pote + '（' + (c.aiFactCheck_poteAt||'—') + '）' : '未実施'}
- 価値観：${c.aiFactCheck_values ? c.aiFactCheck_values + '（' + (c.aiFactCheck_valuesAt||'—') + '）' : '未実施'}

## フェーズ3：RJP反応
- 反応：${c.rjp||'—'}
- それでも来たい理由：${c.rjp_reason||'—'}

## 検査 × 面接 整合性
- エニアグラム動機↔行動：${c.consistency_ennea||'—'}
- エゴグラム傾向↔言動：${c.consistency_ego||'—'}

## 面接官の直感メモ
${c.hunch||'—'}

## 最終判定（決定は柴山さん）
${c.judgment||'未判定'}

---
*奏 Kanade v1 で作成。スコアは参考であり、採否の決定は面接官が行う。*
`;
}

function copyMd() {
  const c = cur(); if (!c) return;
  navigator.clipboard.writeText(buildMarkdown(c)).then(()=>toast('コピーしました')).catch(()=>toast('コピーに失敗しました'));
}
function downloadMd() {
  const c = cur(); if (!c) return;
  const blob = new Blob([buildMarkdown(c)], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `奏プロファイル_${c.name||'候補者'}_${c.date||''}.md`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('ダウンロードしました');
}

// ---------- 共通 ----------
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function switchScreen(name) {
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active', t.dataset.screen===name));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  // P2修正：遷移先画面を最新データで再描画する（profile遷移直後に0/55と出る再描画漏れバグ）
  if (name === 'profile') renderProfile();
  else if (name === 'interview') renderInterview();
  else if (name === 'list') renderList();
  window.scrollTo(0,0);
}
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

document.querySelectorAll('.mode-tab').forEach(t=> t.addEventListener('click', ()=>switchScreen(t.dataset.screen)));

// 起動
load();
renderList(); renderInterview(); renderProfile();
</script>
</body>
</html>
