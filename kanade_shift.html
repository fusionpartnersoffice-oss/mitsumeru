<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>奏 勤務表自動作成ツール — Fusion Partners</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232d7a52'/><text x='16' y='24' font-size='18' text-anchor='middle'>📋</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f1ea;
    --bg2: #ede8df;
    --border: #c8b89a;
    --text: #3a3028;
    --text2: #6a5a4a;
    --text3: #9a8a7a;
    --accent: #8a7a6a;
    --green: #2d7a52;
    --red: #c0392b;
    --gold: #b8860b;
    --card: #faf7f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .header {
    background: var(--text);
    color: var(--bg);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header h1 { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 400; letter-spacing: 3px; }
  .header span { font-size: 11px; color: var(--border); letter-spacing: 2px; }

  .mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 55px;
    z-index: 99;
    flex-wrap: wrap;
  }
  .mode-tab {
    flex: 1; min-width: 90px; padding: 12px 6px; text-align: center; font-size: 12px;
    cursor: pointer; border: none; background: none; color: var(--text3);
    letter-spacing: 0.5px; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); font-weight: 500; }

  .screen { display: none; padding: 18px 16px; max-width: 820px; margin: 0 auto; }
  .screen.active { display: block; }

  .section {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }
  .note { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .warn-note { font-size: 11px; color: var(--gold); margin-top: 4px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; color: var(--text); font-size: 13px; font-family: inherit;
  }
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 120px; }

  .btn-primary {
    background: var(--text); color: var(--bg); border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 13px; cursor: pointer; letter-spacing: 1px;
  }
  .btn-secondary {
    background: none; color: var(--text2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 16px; font-size: 12px; cursor: pointer; letter-spacing: 0.5px;
  }
  .btn-danger { color: var(--red); border-color: var(--red); }

  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px; cursor: pointer;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card.active { border-color: var(--green); background: #f2f8f4; }
  .item-name { font-weight: 500; font-size: 13px; }
  .item-meta { font-size: 11px; color: var(--text3); }
  .item-actions { display: flex; gap: 6px; }
  .item-actions button { font-size: 11px; padding: 4px 8px; }

  table.calc-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  table.calc-table th, table.calc-table td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; }
  table.calc-table th { background: var(--bg2); font-weight: 500; color: var(--text2); }

  .result-box {
    border-radius: 8px; padding: 14px; margin-top: 10px; font-size: 13px;
  }
  .result-ok { background: #eaf5ee; border: 1px solid var(--green); color: #1e5c38; }
  .result-ng { background: #fbeaea; border: 1px solid var(--red); color: #8e2a20; }
  .result-warn { background: #fdf3e0; border: 1px solid var(--gold); color: #7a5b00; }

  .empty-state { text-align: center; color: var(--text3); font-size: 12px; padding: 30px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>奏 — 勤務表自動作成ツール</h1>
  <span>KANADE SHIFT · Phase1</span>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchTab('facility')">🏢 施設マスタ</button>
  <button class="mode-tab" onclick="switchTab('staff')">👤 職員マスタ</button>
  <button class="mode-tab" onclick="switchTab('check')">✅ 法定基準チェック</button>
</div>

<!-- ══════════ モジュールF：施設マスタ ══════════ -->
<div id="screen-facility" class="screen active">
  <div class="section">
    <div class="section-title">施設一覧</div>
    <div id="facility-list" class="card-list">
      <div class="empty-state">まだ施設が登録されていません</div>
    </div>
    <button class="btn-primary" style="margin-top:12px;" onclick="showFacilityForm()">＋ 新規施設を登録</button>
  </div>

  <div id="facility-form" class="section" style="display:none;">
    <div class="section-title">施設登録・編集</div>
    <div class="field">
      <label>施設名</label>
      <input type="text" id="f-name" placeholder="例：グループホーム○○">
    </div>
    <div class="field-row">
      <div class="field">
        <label>所在都道府県</label>
        <select id="f-pref">
          <option value="埼玉県">埼玉県</option>
          <option value="岐阜県">岐阜県</option>
          <option value="愛知県">愛知県</option>
          <option value="三重県">三重県</option>
          <option value="その他">その他（都道府県別ロジック未対応・埼玉県基準を暫定適用）</option>
        </select>
      </div>
      <div class="field">
        <label>サービス類型</label>
        <select id="f-type" onchange="updateFacilityTypeNote()">
          <option value="日中サービス支援型">日中サービス支援型</option>
          <option value="介護サービス包括型">介護サービス包括型</option>
          <option value="外部サービス利用型">外部サービス利用型</option>
        </select>
      </div>
    </div>
    <div id="f-type-note" class="note"></div>
    <div class="field">
      <label>性別構成</label>
      <select id="f-gender">
        <option value="混合">混合（男女どちらの職員も配置可）</option>
        <option value="女性のみ">女性のみ（男性職員は基本的に配置しない）</option>
        <option value="男性のみ">男性のみ</option>
      </select>
    </div>
    <div class="section-title" style="margin-top:14px;">利用者数（障害支援区分別）</div>
    <div class="note">区分1・2の利用者は生活支援員の必要人数計算には算入されません（区分1・2欄は記録用）。</div>
    <div class="field-row" style="margin-top:8px;">
      <div class="field"><label>区分1</label><input type="number" id="f-u1" min="0" value="0"></div>
      <div class="field"><label>区分2</label><input type="number" id="f-u2" min="0" value="0"></div>
      <div class="field"><label>区分3</label><input type="number" id="f-u3" min="0" value="0"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>区分4</label><input type="number" id="f-u4" min="0" value="0"></div>
      <div class="field"><label>区分5</label><input type="number" id="f-u5" min="0" value="0"></div>
      <div class="field"><label>区分6</label><input type="number" id="f-u6" min="0" value="0"></div>
    </div>
    <div id="f-total-users" class="note"></div>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn-primary" onclick="saveFacility()">保存する</button>
      <button class="btn-secondary" onclick="hideFacilityForm()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ══════════ 職員マスタ（モジュールA/B/D/Eの前提データ） ══════════ -->
<div id="screen-staff" class="screen">
  <div class="section">
    <div class="section-title">対象施設</div>
    <select id="staff-facility-select" onchange="renderStaffList()"></select>
  </div>
  <div class="section">
    <div class="section-title">職員一覧</div>
    <div id="staff-list" class="card-list">
      <div class="empty-state">施設を選択し、職員を登録してください</div>
    </div>
    <button class="btn-primary" style="margin-top:12px;" onclick="showStaffForm()">＋ 新規職員を登録</button>
  </div>

  <div id="staff-form" class="section" style="display:none;">
    <div class="section-title">職員登録・編集</div>
    <div class="field-row">
      <div class="field"><label>氏名</label><input type="text" id="s-name" placeholder="例：山田太郎"></div>
      <div class="field">
        <label>性別</label>
        <select id="s-gender">
          <option value="女性">女性</option>
          <option value="男性">男性</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>職種</label>
      <select id="s-role" onchange="updateStaffRoleNote()">
        <option value="生活支援員">生活支援員</option>
        <option value="世話人">世話人</option>
        <option value="管理者">管理者</option>
        <option value="サービス管理責任者">サービス管理責任者</option>
      </select>
    </div>
    <div id="s-role-note" class="note"></div>
    <div class="field-row">
      <div class="field"><label>契約勤務日数（月あたり）</label><input type="number" id="s-days" min="0" value="20"></div>
      <div class="field"><label>契約勤務時間（週あたり・h）</label><input type="number" id="s-hours" min="0" max="40" value="40"></div>
    </div>
    <div class="field">
      <label>年次有給休暇 残日数（当年度・年5日消化義務の管理対象）</label>
      <input type="number" id="s-paid-leave" min="0" value="10">
    </div>
    <div style="display:flex; gap:10px; margin-top:14px;">
      <button class="btn-primary" onclick="saveStaff()">保存する</button>
      <button class="btn-secondary" onclick="hideStaffForm()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ══════════ モジュールB：法定基準チェック ══════════ -->
<div id="screen-check" class="screen">
  <div class="section">
    <div class="section-title">対象施設</div>
    <select id="check-facility-select" onchange="renderLegalCheck()"></select>
  </div>

  <div id="check-result-area">
    <div class="empty-state">施設を選択してください</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// データ層（localStorage・施設マスタ／職員マスタ）
// ═══════════════════════════════════════════════
const FACILITY_KEY = 'kanade_shift_facilities';
const STAFF_KEY     = 'kanade_shift_staff';

function loadFacilities() {
  try { return JSON.parse(localStorage.getItem(FACILITY_KEY) || '[]'); } catch(e) { return []; }
}
function saveFacilities(list) { localStorage.setItem(FACILITY_KEY, JSON.stringify(list)); }

function loadStaff() {
  try { return JSON.parse(localStorage.getItem(STAFF_KEY) || '[]'); } catch(e) { return []; }
}
function saveStaffList(list) { localStorage.setItem(STAFF_KEY, JSON.stringify(list)); }

let facilities = loadFacilities();
let staffList = loadStaff();
let activeFacilityId = null;
let editingFacilityId = null;
let editingStaffId = null;

// ═══════════════════════════════════════════════
// タブ切替
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['facility','staff','check'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  if (tab === 'staff') { populateFacilitySelect('staff-facility-select'); renderStaffList(); }
  if (tab === 'check') { populateFacilitySelect('check-facility-select'); renderLegalCheck(); }
}

function populateFacilitySelect(selectId) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  sel.innerHTML = facilities.length
    ? facilities.map(f => `<option value="${f.id}">${f.name}</option>`).join('')
    : '<option value="">（施設未登録）</option>';
  if (facilities.some(f => f.id === current)) sel.value = current;
}

// ═══════════════════════════════════════════════
// モジュールF：施設マスタ
// ═══════════════════════════════════════════════
function renderFacilityList() {
  const box = document.getElementById('facility-list');
  if (!facilities.length) { box.innerHTML = '<div class="empty-state">まだ施設が登録されていません</div>'; return; }
  box.innerHTML = facilities.map(f => {
    const total = f.u1+f.u2+f.u3+f.u4+f.u5+f.u6;
    return `
    <div class="item-card">
      <div>
        <div class="item-name">${f.name}</div>
        <div class="item-meta">${f.pref} ／ ${f.type} ／ 利用者${total}名 ／ ${f.gender}</div>
      </div>
      <div class="item-actions">
        <button class="btn-secondary" onclick="editFacility('${f.id}')">編集</button>
        <button class="btn-secondary btn-danger" onclick="deleteFacility('${f.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

function updateFacilityTypeNote() {
  const type = document.getElementById('f-type').value;
  const note = document.getElementById('f-type-note');
  if (type === '日中サービス支援型') {
    note.textContent = '世話人配置基準：利用者5人に1人以上／夜勤必須（共同生活住居ごとに1人以上、宿直不可）';
  } else {
    note.textContent = '世話人配置基準：利用者6人に1人以上／夜間支援従事者の配置は任意（配置すると加算対象）';
  }
}

function showFacilityForm(id) {
  editingFacilityId = id || null;
  document.getElementById('facility-form').style.display = 'block';
  if (id) {
    const f = facilities.find(x => x.id === id);
    document.getElementById('f-name').value = f.name;
    document.getElementById('f-pref').value = f.pref;
    document.getElementById('f-type').value = f.type;
    document.getElementById('f-gender').value = f.gender;
    document.getElementById('f-u1').value = f.u1;
    document.getElementById('f-u2').value = f.u2;
    document.getElementById('f-u3').value = f.u3;
    document.getElementById('f-u4').value = f.u4;
    document.getElementById('f-u5').value = f.u5;
    document.getElementById('f-u6').value = f.u6;
  } else {
    ['f-name'].forEach(id => document.getElementById(id).value = '');
    ['f-u1','f-u2','f-u3','f-u4','f-u5','f-u6'].forEach(id => document.getElementById(id).value = 0);
    document.getElementById('f-pref').value = '埼玉県';
    document.getElementById('f-type').value = '日中サービス支援型';
    document.getElementById('f-gender').value = '混合';
  }
  updateFacilityTypeNote();
  updateFacilityTotalUsers();
}
function hideFacilityForm() {
  document.getElementById('facility-form').style.display = 'none';
  editingFacilityId = null;
}
function updateFacilityTotalUsers() {
  const vals = ['f-u1','f-u2','f-u3','f-u4','f-u5','f-u6'].map(id => parseInt(document.getElementById(id).value)||0);
  const total = vals.reduce((a,b)=>a+b,0);
  document.getElementById('f-total-users').textContent = `合計利用者数：${total}名（サービス管理責任者の配置基準＝利用者30人に1人以上、の算定に使用）`;
}
['f-u1','f-u2','f-u3','f-u4','f-u5','f-u6'].forEach(id => {
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateFacilityTotalUsers);
  });
});

function editFacility(id) { showFacilityForm(id); }

function deleteFacility(id) {
  if (!confirm('この施設を削除しますか？関連する職員データは残りますが、施設との紐付けが外れます。')) return;
  facilities = facilities.filter(f => f.id !== id);
  saveFacilities(facilities);
  renderFacilityList();
}

function saveFacility() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('施設名を入力してください。'); return; }
  const data = {
    id: editingFacilityId || ('fac_' + Date.now()),
    name,
    pref: document.getElementById('f-pref').value,
    type: document.getElementById('f-type').value,
    gender: document.getElementById('f-gender').value,
    u1: parseInt(document.getElementById('f-u1').value)||0,
    u2: parseInt(document.getElementById('f-u2').value)||0,
    u3: parseInt(document.getElementById('f-u3').value)||0,
    u4: parseInt(document.getElementById('f-u4').value)||0,
    u5: parseInt(document.getElementById('f-u5').value)||0,
    u6: parseInt(document.getElementById('f-u6').value)||0,
  };
  if (editingFacilityId) {
    const idx = facilities.findIndex(f => f.id === editingFacilityId);
    facilities[idx] = data;
  } else {
    facilities.push(data);
  }
  saveFacilities(facilities);
  hideFacilityForm();
  renderFacilityList();
}

// ═══════════════════════════════════════════════
// 職員マスタ
// ═══════════════════════════════════════════════
function currentStaffFacilityId() {
  return document.getElementById('staff-facility-select').value;
}

function renderStaffList() {
  const fid = currentStaffFacilityId();
  const box = document.getElementById('staff-list');
  const list = staffList.filter(s => s.facilityId === fid);
  if (!fid) { box.innerHTML = '<div class="empty-state">施設を選択し、職員を登録してください</div>'; return; }
  if (!list.length) { box.innerHTML = '<div class="empty-state">この施設の職員はまだ登録されていません</div>'; return; }
  box.innerHTML = list.map(s => `
    <div class="item-card">
      <div>
        <div class="item-name">${s.name}（${s.gender}）</div>
        <div class="item-meta">${s.role} ／ 契約：月${s.contractDays}日・週${s.contractHours}h ／ 有給残${s.paidLeaveRemaining}日</div>
      </div>
      <div class="item-actions">
        <button class="btn-secondary" onclick="editStaff('${s.id}')">編集</button>
        <button class="btn-secondary btn-danger" onclick="deleteStaff('${s.id}')">削除</button>
      </div>
    </div>`).join('');
}

function updateStaffRoleNote() {
  const role = document.getElementById('s-role').value;
  const note = document.getElementById('s-role-note');
  const notes = {
    '生活支援員': '障害支援区分3〜6の利用者数に応じて必要人数が変動します（区分1・2は算入されません）。',
    '世話人': '施設のサービス類型により配置基準が異なります（6:1 または 5:1）。非常勤可。',
    '管理者': '施設ごとに1名必須。常勤で管理業務に従事（支障ない場合は他職務と兼務可）。',
    'サービス管理責任者': '利用者30人に1人以上（31人以上は30人ごとに1人加算）。定員20人以上は常勤専従が努力義務。',
  };
  note.textContent = notes[role] || '';
}

function showStaffForm(id) {
  const fid = currentStaffFacilityId();
  if (!fid) { alert('先に対象施設を選択してください。'); return; }
  editingStaffId = id || null;
  document.getElementById('staff-form').style.display = 'block';
  if (id) {
    const s = staffList.find(x => x.id === id);
    document.getElementById('s-name').value = s.name;
    document.getElementById('s-gender').value = s.gender;
    document.getElementById('s-role').value = s.role;
    document.getElementById('s-days').value = s.contractDays;
    document.getElementById('s-hours').value = s.contractHours;
    document.getElementById('s-paid-leave').value = s.paidLeaveRemaining;
  } else {
    document.getElementById('s-name').value = '';
    document.getElementById('s-gender').value = '女性';
    document.getElementById('s-role').value = '生活支援員';
    document.getElementById('s-days').value = 20;
    document.getElementById('s-hours').value = 40;
    document.getElementById('s-paid-leave').value = 10;
  }
  updateStaffRoleNote();
}
function hideStaffForm() {
  document.getElementById('staff-form').style.display = 'none';
  editingStaffId = null;
}

function editStaff(id) { showStaffForm(id); }

function deleteStaff(id) {
  if (!confirm('この職員を削除しますか？')) return;
  staffList = staffList.filter(s => s.id !== id);
  saveStaffList(staffList);
  renderStaffList();
}

function saveStaff() {
  const fid = currentStaffFacilityId();
  const name = document.getElementById('s-name').value.trim();
  if (!name) { alert('氏名を入力してください。'); return; }
  const facility = facilities.find(f => f.id === fid);
  const gender = document.getElementById('s-gender').value;
  if (facility && facility.gender === '女性のみ' && gender === '男性') {
    if (!confirm('この施設は「女性のみ」設定のため、男性職員は基本的に配置しない運用です。それでも登録しますか？（記録のみ・シフト作成時に自動除外されます）')) return;
  }
  const data = {
    id: editingStaffId || ('staff_' + Date.now()),
    facilityId: fid,
    name,
    gender,
    role: document.getElementById('s-role').value,
    contractDays: parseInt(document.getElementById('s-days').value)||0,
    contractHours: parseInt(document.getElementById('s-hours').value)||0,
    paidLeaveRemaining: parseInt(document.getElementById('s-paid-leave').value)||0,
  };
  if (editingStaffId) {
    const idx = staffList.findIndex(s => s.id === editingStaffId);
    staffList[idx] = data;
  } else {
    staffList.push(data);
  }
  saveStaffList(staffList);
  hideStaffForm();
  renderStaffList();
}

// ═══════════════════════════════════════════════
// モジュールB：法定基準チェック計算ロジック
// ✅出典：埼玉県資料「共同生活援助（グループホーム）の基準 概要 R6.3」4ページ
// 端数処理：基準上必要な人員数＝切り上げ／実績・加算届出様式＝切り下げ（別ロジック・混同厳禁）
// ═══════════════════════════════════════════════

// 生活支援員の必要人数（常勤換算）＝ イ＋ロ＋ハ＋ニ
// イ：区分3÷9　ロ：区分4÷6　ハ：区分5÷4　ニ：区分6÷2.5
// 区分1・2は算入しない。外部サービス利用型は生活支援員自体が不要（委託のため）
function calcSeikatsuShienStaffRequired(facility, roundMode) {
  if (facility.type === '外部サービス利用型') {
    return { required: 0, detail: '外部サービス利用型のため生活支援員は不要（委託）', breakdown: null };
  }
  const i  = facility.u3 / 9;
  const ro = facility.u4 / 6;
  const ha = facility.u5 / 4;
  const ni = facility.u6 / 2.5;
  const rawSum = i + ro + ha + ni;
  const required = roundMode === 'up' ? roundUp2(rawSum) : roundDown2(rawSum);
  return {
    required,
    rawSum,
    breakdown: { イ: roundTo2(i), ロ: roundTo2(ro), ハ: roundTo2(ha), ニ: roundTo2(ni) },
  };
}

// 世話人の必要人数（指定基準＝最低ライン）
// 介護サービス包括型・外部サービス利用型：利用者6人に1人以上／日中サービス支援型：利用者5人に1人以上
function calcSewaninStaffRequired(facility, roundMode) {
  const totalUsers = facility.u1+facility.u2+facility.u3+facility.u4+facility.u5+facility.u6;
  const divisor = facility.type === '日中サービス支援型' ? 5 : 6;
  const raw = totalUsers / divisor;
  const required = roundMode === 'up' ? roundUp2(raw) : roundDown2(raw);
  return { required, rawSum: raw, divisor };
}

// サービス管理責任者：利用者30人に1人以上（31人以上は30人ごとに1人加算）
function calcServiceKanrisekininRequired(facility) {
  const totalUsers = facility.u1+facility.u2+facility.u3+facility.u4+facility.u5+facility.u6;
  if (totalUsers === 0) return 0;
  return Math.ceil(totalUsers / 30);
}

// 端数処理ユーティリティ（第二位で切り上げ／切り下げ。第三位以降の誤差を避けるため一度丸めてから処理）
// 表示用（四捨五入）。切り上げ／切り下げの判定には使わない（生の合計値の精度を保つ）
function roundTo2(n) { return Math.round(n * 100) / 100; }
// 浮動小数点誤差対策として微小なイプシロンを加減してからceil/floorする
function roundUp2(n)   { return Math.ceil(n * 100 - 1e-9) / 100; }
function roundDown2(n) { return Math.floor(n * 100 + 1e-9) / 100; }

function countActualStaff(facilityId, role) {
  return staffList.filter(s => s.facilityId === facilityId && s.role === role).length;
}

function renderLegalCheck() {
  const fid = document.getElementById('check-facility-select').value;
  const area = document.getElementById('check-result-area');
  if (!fid) { area.innerHTML = '<div class="empty-state">施設を選択してください</div>'; return; }
  const facility = facilities.find(f => f.id === fid);
  if (!facility) { area.innerHTML = '<div class="empty-state">施設を選択してください</div>'; return; }

  const seikatsuUp   = calcSeikatsuShienStaffRequired(facility, 'up');
  const seikatsuDown = calcSeikatsuShienStaffRequired(facility, 'down');
  const sewaninUp     = calcSewaninStaffRequired(facility, 'up');
  const sewaninDown   = calcSewaninStaffRequired(facility, 'down');
  const sabikanRequired = calcServiceKanrisekininRequired(facility);

  const actualSeikatsu = countActualStaff(fid, '生活支援員');
  const actualSewanin  = countActualStaff(fid, '世話人');
  const actualKanrisha = countActualStaff(fid, '管理者');
  const actualSabikan  = countActualStaff(fid, 'サービス管理責任者');

  function statusRow(label, requiredUp, requiredDown, actual, note) {
    const ok = actual >= requiredUp;
    const cls = ok ? 'result-ok' : (actual >= requiredDown ? 'result-warn' : 'result-ng');
    const label2 = ok ? '✅ 充足' : (actual >= requiredDown ? '⚠ 基準ギリギリ（実績様式上は充足だが基準人数には不足）' : '🔴 基準未達');
    return `<tr>
      <td>${label}</td>
      <td>${requiredUp}名（基準用・切り上げ）</td>
      <td>${requiredDown}名（実績様式用・切り下げ）</td>
      <td>${actual}名</td>
      <td class="${cls}" style="border-radius:0;">${label2}</td>
    </tr>${note ? `<tr><td colspan="5" style="font-size:11px;color:var(--text3);">${note}</td></tr>` : ''}`;
  }

  const totalUsers = facility.u1+facility.u2+facility.u3+facility.u4+facility.u5+facility.u6;

  area.innerHTML = `
    <div class="section">
      <div class="section-title">${facility.name}（${facility.pref}・${facility.type}・利用者${totalUsers}名）</div>
      <div class="note">✅出典：埼玉県資料「共同生活援助（グループホーム）の基準 概要 R6.3」4ページ。基準人数は小数点第二位切り上げ、実績・加算届出様式は小数点第二位切り下げで別々に算出しています（両者の混同は基本単位30〜50%減算のリスクがあるため、この2列は必ず別ロジックで表示しています）。</div>
      <table class="calc-table">
        <tr><th>職種</th><th>基準必要人数</th><th>実績様式上の必要人数</th><th>実配置人数</th><th>判定</th></tr>
        ${statusRow('生活支援員', seikatsuUp.required, seikatsuDown.required, actualSeikatsu,
          seikatsuUp.breakdown ? `内訳（区分3÷9＋区分4÷6＋区分5÷4＋区分6÷2.5）：イ${seikatsuUp.breakdown.イ}＋ロ${seikatsuUp.breakdown.ロ}＋ハ${seikatsuUp.breakdown.ハ}＋ニ${seikatsuUp.breakdown.ニ}` : seikatsuUp.detail)}
        ${statusRow('世話人', sewaninUp.required, sewaninDown.required, actualSewanin,
          `配置基準：利用者${sewaninUp.divisor}人に1人以上（${facility.type}の指定基準）`)}
        ${statusRow('管理者', 1, 1, actualKanrisha, '施設ごとに1名必須（常勤・支障ない場合は他職務と兼務可）')}
        ${statusRow('サービス管理責任者', sabikanRequired, sabikanRequired, actualSabikan, '利用者30人に1人以上（31人以上は30人ごとに1人加算）')}
      </table>
    </div>
    ${facility.type === '日中サービス支援型' ? `
    <div class="section result-warn" style="font-size:12px;">
      ⚠ この施設は日中サービス支援型のため、共同生活住居ごとに夜勤必須（宿直不可）・夜間深夜を通じて1人以上の配置が必要です（✅埼玉県資料・厚労省資料19・22ページ）。夜間支援の具体的な時間帯定義（「22時〜5時」説）は★出典未確認のため、本ツールでは時間帯を固定せず今後設定可能な変数として扱います。
    </div>` : ''}
    <div class="section" style="font-size:11px;color:var(--text3);">
      ★世話人の報酬区分（令和6年度改定での変更詳細）・都道府県条例上乗せ基準（埼玉県以外）は出典未確認のため、本チェックには反映していません。上記の判定は「指定基準（最低ライン）」に基づくものであり、報酬請求上の加算判定とは別のロジックです。
    </div>
  `;
}
