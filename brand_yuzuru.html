<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弦 Yuzuru — FusionOS</title>
<meta name="description" content="地域連携と「自動営業」。弦を構成するツール群のご紹介。">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:     #F0EDE8;
  --bg2:    #FAF8F4;
  --navy:   #0b1929;
  --navy2:  #1c3248;
  --gold:   #7d6428;
  --gold2:  #9e7f34;
  --gold3:  #c9a850;
  --text:   #1a2535;
  --dim:    #536070;
  --dim2:   #8a98a8;
  --border: #d8d2c8;
  --shadow: 0 2px 16px rgba(0,0,0,.06);
}
html,body{background:var(--bg);font-family:'Hiragino Mincho ProN','Yu Mincho','Georgia',serif;color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%;}
.sans{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;}
.wrap{max-width:640px;margin:0 auto;padding:64px 32px 88px;}
.back{
  font-size:12px;letter-spacing:.5px;color:var(--dim);text-decoration:none;
  display:inline-block;margin-bottom:36px;
}
.back:hover{color:var(--gold2);}
.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);margin-bottom:14px;font-weight:500;}
.h1{font-size:clamp(32px,5vw,44px);font-weight:300;color:var(--navy);line-height:1.2;}
.h1 .en{font-size:.5em;color:var(--gold2);letter-spacing:1px;margin-left:12px;}
.tagline{font-size:clamp(14px,1.8vw,16px);color:var(--dim);line-height:1.9;margin-top:16px;}
.rule{width:32px;height:2px;background:var(--gold3);margin:24px 0 40px;}
.tool{padding:24px 0;border-top:1px solid var(--border);}
.tool:last-child{border-bottom:1px solid var(--border);}
.tool-name{font-size:11px;letter-spacing:1.5px;color:var(--gold2);text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.tool-desc{font-size:14px;line-height:1.85;color:var(--text);}
.note{font-size:12px;color:var(--dim2);line-height:1.8;margin-top:24px;}
.foot{margin-top:56px;text-align:center;border-top:1px solid var(--border);padding-top:24px;}
.foot-contact{font-size:11px;color:var(--dim);letter-spacing:.5px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back sans" href="index_brand.html">← FusionOSの物語へ戻る</a>
  <header>
    <div class="eyebrow sans">FusionOS — 04／売る</div>
    <h1 class="h1">弦<span class="en sans">Yuzuru</span></h1>
    <div class="tagline sans">地域連携と「自動営業」。施設データから営業先リストとマップを自動生成して届ける。</div>
    <div class="rule"></div>
  </header>

  <div class="tool">
    <div class="tool-name">yuzuru_map</div>
    <div class="tool-desc sans">商圏マップ。営業先の発見と関係構築を支える。</div>
  </div>

  <div class="note sans">※ 現時点で弦は本ツール1本のみです。今後の拡張時にここへ追加します。</div>

  <footer class="foot">
    <div class="foot-contact sans">Fusion Partners　｜　fusion.partners.office@gmail.com</div>
  </footer>
</div>
</body>
</html>
