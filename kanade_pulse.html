<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>奏 パルスサーベイ — Fusion Partners</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232d7a52'/><text x='16' y='24' font-size='18' text-anchor='middle'>🌤️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f1ea;
    --bg2: #ede8df;
    --border: #c8b89a;
    --text: #3a3028;
    --text2: #6a5a4a;
    --text3: #9a8a7a;
    --accent: #8a7a6a;
    --green: #2d7a52;
    --red: #c0392b;
    --gold: #b8860b;
    --card: #faf7f2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 100px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .header {
    background: var(--text);
    color: var(--bg);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .header h1 { font-family: 'Noto Serif JP', serif; font-size: 18px; font-weight: 400; letter-spacing: 3px; }
  .header span { font-size: 11px; color: var(--border); letter-spacing: 2px; }

  .mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 55px;
    z-index: 99;
    flex-wrap: wrap;
  }
  .mode-tab {
    flex: 1; min-width: 90px; padding: 12px 6px; text-align: center; font-size: 12px;
    cursor: pointer; border: none; background: none; color: var(--text3);
    letter-spacing: 0.5px; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); font-weight: 500; }

  .screen { display: none; padding: 18px 16px; max-width: 820px; margin: 0 auto; }
  .screen.active { display: block; }

  .section {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 14px;
  }
  .section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; }
  .note { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 5px;
    background: #fff; color: var(--text); font-size: 13px; font-family: inherit;
  }
  .field-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 120px; }

  .btn-primary {
    background: var(--text); color: var(--bg); border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 13px; cursor: pointer; letter-spacing: 1px;
  }
  .btn-secondary {
    background: none; color: var(--text2); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 16px; font-size: 12px; cursor: pointer; letter-spacing: 0.5px;
  }

  .weather-group { display: flex; gap: 10px; }
  .weather-chip {
    flex: 1; text-align: center; padding: 14px 8px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 24px; background: #fff; transition: all .15s;
  }
  .weather-chip.selected { border-color: var(--accent); background: var(--bg2); box-shadow: inset 0 0 0 2px var(--accent); }
  .weather-chip .label { display: block; font-size: 11px; color: var(--text2); margin-top: 4px; }

  table.calc-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  table.calc-table th, table.calc-table td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; }
  table.calc-table th { background: var(--bg2); font-weight: 500; color: var(--text2); }

  .result-box { border-radius: 8px; padding: 14px; margin-top: 10px; font-size: 13px; }
  .result-ok { background: #eaf5ee; border: 1px solid var(--green); color: #1e5c38; }
  .result-ng { background: #fbeaea; border: 1px solid var(--red); color: #8e2a20; }
  .result-warn { background: #fdf3e0; border: 1px solid var(--gold); color: #7a5b00; }

  .empty-state { text-align: center; color: var(--text3); font-size: 12px; padding: 30px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>奏 — パルスサーベイ</h1>
  <span>KANADE PULSE · MVP</span>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchTab('answer')">📝 回答入力</button>
  <button class="mode-tab" onclick="switchTab('history')">📊 履歴</button>
  <button class="mode-tab" onclick="switchTab('alerts')">🔔 アラート一覧</button>
</div>

<!-- ══════════ PS-1：回答入力 ══════════ -->
<div id="screen-answer" class="screen active">
  <div class="section">
    <div class="section-title">対象施設・対象職員</div>
    <div class="field-row">
      <div class="field"><label>施設</label><select id="answer-facility-select" onchange="onAnswerFacilityChange()"></select></div>
      <div class="field"><label>職員</label><select id="answer-staff-select"></select></div>
    </div>
    <div class="field"><label>対象月</label><input type="month" id="answer-month"></div>
    <div class="note">月1回配信を想定した2問アンケートです。既存の奏・勤務表自動作成ツール（`kanade_shift.html`）の施設マスタ・職員マスタを読み取り専用で参照しています（職員の登録・編集はそちらのツールで行ってください）。</div>
  </div>

  <div class="section">
    <div class="section-title">Q1. 今月の調子は？</div>
    <div class="weather-group" id="mood-group">
      <div class="weather-chip" data-value="晴れ" onclick="selectWeather('mood','晴れ')">☀️<span class="label">晴れ</span></div>
      <div class="weather-chip" data-value="曇り" onclick="selectWeather('mood','曇り')">☁️<span class="label">曇り</span></div>
      <div class="weather-chip" data-value="雨"   onclick="selectWeather('mood','雨')">🌧️<span class="label">雨</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Q2. 職場の人間関係は？</div>
    <div class="weather-group" id="relationship-group">
      <div class="weather-chip" data-value="晴れ" onclick="selectWeather('relationship','晴れ')">☀️<span class="label">晴れ</span></div>
      <div class="weather-chip" data-value="曇り" onclick="selectWeather('relationship','曇り')">☁️<span class="label">曇り</span></div>
      <div class="weather-chip" data-value="雨"   onclick="selectWeather('relationship','雨')">🌧️<span class="label">雨</span></div>
    </div>
  </div>

  <button class="btn-primary" onclick="submitPulse()">回答を保存する</button>
  <div id="answer-save-msg" class="note" style="margin-top:8px;"></div>
</div>

<!-- ══════════ PS-2：履歴 ══════════ -->
<div id="screen-history" class="screen">
  <div class="section">
    <div class="section-title">対象施設・対象職員</div>
    <div class="field-row">
      <div class="field"><label>施設</label><select id="history-facility-select" onchange="onHistoryFacilityChange()"></select></div>
      <div class="field"><label>職員</label><select id="history-staff-select" onchange="renderHistory()"></select></div>
    </div>
  </div>
  <div id="history-result-area">
    <div class="empty-state">施設・職員を選択してください</div>
  </div>
</div>

<!-- ══════════ PS-3+PS-4：アラート一覧 ══════════ -->
<div id="screen-alerts" class="screen">
  <div class="section">
    <div class="section-title">対象施設</div>
    <select id="alerts-facility-select" onchange="renderAlerts()"></select>
  </div>
  <div id="alerts-result-area">
    <div class="empty-state">施設を選択してください</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// データ層
// 施設・職員マスタは既存の奏・勤務表自動作成ツール（kanade_shift.html）のデータを
// 読み取り専用で参照する（同一オリジンのlocalStorageキーを共有・書き込みはしない）
// ═══════════════════════════════════════════════
function loadFacilitiesReadOnly() {
  try { return JSON.parse(localStorage.getItem('kanade_shift_facilities') || '[]'); } catch(e) { return []; }
}
function loadStaffReadOnly() {
  try { return JSON.parse(localStorage.getItem('kanade_shift_staff') || '[]'); } catch(e) { return []; }
}

const WEATHER_ORDER = { '晴れ': 0, '曇り': 1, '雨': 2 };

function pulseKey(staffId) { return 'kanade_pulse_' + staffId; }
function loadPulse(staffId) {
  try { return JSON.parse(localStorage.getItem(pulseKey(staffId)) || '[]'); } catch(e) { return []; }
}
function savePulse(staffId, list) { localStorage.setItem(pulseKey(staffId), JSON.stringify(list)); }

let facilities = loadFacilitiesReadOnly();
let staffList = loadStaffReadOnly();
let selectedMood = null;
let selectedRelationship = null;

// ═══════════════════════════════════════════════
// タブ切替
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['answer','history','alerts'][i] === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  // 他ツールで施設・職員が更新されている可能性があるため、都度読み直す
  facilities = loadFacilitiesReadOnly();
  staffList = loadStaffReadOnly();
  if (tab === 'answer')  { populateFacilitySelect('answer-facility-select'); onAnswerFacilityChange(); }
  if (tab === 'history') { populateFacilitySelect('history-facility-select'); onHistoryFacilityChange(); }
  if (tab === 'alerts')  { populateFacilitySelect('alerts-facility-select'); renderAlerts(); }
}

function populateFacilitySelect(selectId) {
  const sel = document.getElementById(selectId);
  const current = sel.value;
  sel.innerHTML = facilities.length
    ? facilities.map(f => `<option value="${f.id}">${f.name}</option>`).join('')
    : '<option value="">（施設未登録・先にkanade_shift.htmlで登録してください）</option>';
  if (facilities.some(f => f.id === current)) sel.value = current;
}

function populateStaffSelect(selectId, facilityId) {
  const sel = document.getElementById(selectId);
  const list = staffList.filter(s => s.facilityId === facilityId);
  sel.innerHTML = list.length
    ? list.map(s => `<option value="${s.id}">${s.name}（${s.role}）</option>`).join('')
    : '<option value="">（職員未登録）</option>';
}

// ═══════════════════════════════════════════════
// PS-1：回答入力
// ═══════════════════════════════════════════════
function onAnswerFacilityChange() {
  const fid = document.getElementById('answer-facility-select').value;
  populateStaffSelect('answer-staff-select', fid);
}

function selectWeather(kind, value) {
  if (kind === 'mood') selectedMood = value; else selectedRelationship = value;
  const groupId = kind === 'mood' ? 'mood-group' : 'relationship-group';
  document.querySelectorAll(`#${groupId} .weather-chip`).forEach(el => {
    el.classList.toggle('selected', el.dataset.value === value);
  });
}

function submitPulse() {
  const staffId = document.getElementById('answer-staff-select').value;
  const month = document.getElementById('answer-month').value; // "YYYY-MM"
  const msg = document.getElementById('answer-save-msg');
  if (!staffId) { alert('職員を選択してください。'); return; }
  if (!month) { alert('対象月を選択してください。'); return; }
  if (!selectedMood || !selectedRelationship) { alert('2問とも回答してください。'); return; }

  const list = loadPulse(staffId);
  const idx = list.findIndex(e => e.month === month);
  const entry = { month, mood: selectedMood, relationship: selectedRelationship, updatedAt: new Date().toISOString() };
  if (idx >= 0) list[idx] = entry; else list.push(entry);
  list.sort((a,b) => a.month.localeCompare(b.month));
  savePulse(staffId, list);
  msg.textContent = `${month}分を保存しました。`;
  msg.style.color = 'var(--green)';
}

// ═══════════════════════════════════════════════
// PS-2：履歴
// ═══════════════════════════════════════════════
function onHistoryFacilityChange() {
  const fid = document.getElementById('history-facility-select').value;
  populateStaffSelect('history-staff-select', fid);
  renderHistory();
}

function renderHistory() {
  const staffId = document.getElementById('history-staff-select').value;
  const area = document.getElementById('history-result-area');
  if (!staffId) { area.innerHTML = '<div class="empty-state">施設・職員を選択してください</div>'; return; }
  const list = loadPulse(staffId);
  if (!list.length) { area.innerHTML = '<div class="empty-state">この職員の回答履歴はまだありません</div>'; return; }
  const staff = staffList.find(s => s.id === staffId);
  const weatherEmoji = { '晴れ':'☀️', '曇り':'☁️', '雨':'🌧️' };
  const rows = list.slice().reverse().map(e => `
    <tr>
      <td>${e.month}</td>
      <td>${weatherEmoji[e.mood]||''} ${e.mood}</td>
      <td>${weatherEmoji[e.relationship]||''} ${e.relationship}</td>
    </tr>`).join('');
  area.innerHTML = `
    <div class="section">
      <div class="section-title">${staff ? staff.name : ''} — 回答履歴（${list.length}件）</div>
      <table class="calc-table">
        <tr><th>対象月</th><th>Q1：調子</th><th>Q2：人間関係</th></tr>
        ${rows}
      </table>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// PS-3：変化検知ロジック／PS-4：アラート通知
// 「晴れ→曇り」「曇り→雨」「晴れ→雨」等、前月比で悪化した場合、または
// 直近2か月以上の未回答が続く場合に検知する。新規の判定ロジックは最小限にとどめ、
// WEATHER_ORDER（晴れ<曇り<雨）の数値比較のみで悪化判定を行う。
// ═══════════════════════════════════════════════
function detectPulseAlerts(staffId, asOfMonth) {
  const list = loadPulse(staffId);
  const alerts = [];
  if (!list.length) return alerts;

  const sorted = list.slice().sort((a,b) => a.month.localeCompare(b.month));
  const latest = sorted[sorted.length - 1];
  const prev = sorted.length >= 2 ? sorted[sorted.length - 2] : null;

  if (prev) {
    if (WEATHER_ORDER[latest.mood] > WEATHER_ORDER[prev.mood]) {
      alerts.push(`「今月の調子」が${prev.mood}→${latest.mood}に悪化（${prev.month}→${latest.month}）`);
    }
    if (WEATHER_ORDER[latest.relationship] > WEATHER_ORDER[prev.relationship]) {
      alerts.push(`「職場の人間関係」が${prev.relationship}→${latest.relationship}に悪化（${prev.month}→${latest.month}）`);
    }
  }

  // 未回答が続いているかの簡易判定：直近の回答月から2か月以上経過しているか
  if (asOfMonth) {
    const [ay, am] = asOfMonth.split('-').map(Number);
    const [ly, lm] = latest.month.split('-').map(Number);
    const monthsGap = (ay - ly) * 12 + (am - lm);
    if (monthsGap >= 2) {
      alerts.push(`直近の回答は${latest.month}分（${monthsGap}か月未回答が継続）`);
    }
  }

  return alerts;
}

function renderAlerts() {
  const fid = document.getElementById('alerts-facility-select').value;
  const area = document.getElementById('alerts-result-area');
  if (!fid) { area.innerHTML = '<div class="empty-state">施設を選択してください</div>'; return; }
  const facility = facilities.find(f => f.id === fid);
  const staffOfFacility = staffList.filter(s => s.facilityId === fid);
  if (!staffOfFacility.length) { area.innerHTML = '<div class="empty-state">この施設の職員が登録されていません</div>'; return; }

  const now = new Date();
  const asOfMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const rows = [];
  staffOfFacility.forEach(s => {
    const alerts = detectPulseAlerts(s.id, asOfMonth);
    if (alerts.length) {
      rows.push(`<tr>
        <td>${s.name}（${s.role}）</td>
        <td class="result-warn" style="border-radius:0;">⚠ ${s.name}さんのコンディション低下・早期の1on1を推奨<br><span style="font-size:11px;">${alerts.join('<br>')}</span></td>
      </tr>`);
    }
  });

  area.innerHTML = `
    <div class="section">
      <div class="section-title">${facility ? facility.name : ''} — アラート一覧（${rows.length}件）</div>
      <div class="note">前月比での「晴れ→曇り」等の悪化、または2か月以上の未回答継続を検知しています（判定基準日：${asOfMonth}）。</div>
      ${rows.length ? `
      <table class="calc-table">
        <tr><th>職員</th><th>アラート内容</th></tr>
        ${rows.join('')}
      </table>` : `<div class="result-box result-ok">✅ 現在、アラート対象はありません</div>`}
    </div>
  `;
}

// ═══════════════════════════════════════════════
// 起動時
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('answer-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  populateFacilitySelect('answer-facility-select');
  onAnswerFacilityChange();
});
</script>
</body>
</html>
